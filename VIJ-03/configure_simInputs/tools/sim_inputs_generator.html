          <div class="radio-group">
            <label><input type="radio" name="new-material-type" value="fluid" data-action="set-new-material-type" ${draft._type === 'fluid' ? 'checked' : ''}> fluid</label>
            <label><input type="radio" name="new-material-type" value="solid" data-action="set-new-material-type" ${draft._type === 'solid' ? 'checked' : ''}> solid</label>
          </div>
        </div>
        <div class="field-group">
          <label>Molecular Weight</label>
          <input type="number" step="any" value="${draft.molecular_weight}" data-action="set-new-material-field" data-field="molecular_weight" data-kind="number">
        </div>
      </div>
      ${draft._type === 'fluid' ? `
        <div style="margin-top:12px; display:flex; flex-direction:column; gap:12px;">
          <div class="bc-block">${renderPropertyModelEditor('rho', draft.rho)}</div>
          <div class="bc-block">${renderPropertyModelEditor('Cp', draft.Cp)}</div>
          <div class="bc-block">${renderPropertyModelEditor('mu', draft.mu)}</div>
          <div class="bc-block">${renderPropertyModelEditor('kappa', draft.kappa)}</div>
        </div>` : `
        <div class="field-grid compact" style="margin-top:12px;">
          <div class="field-group"><label>Density (kg/m³)</label><input type="number" step="any" value="${draft.solid_rho}" data-action="set-new-material-field" data-field="solid_rho" data-kind="number"></div>
          <div class="field-group"><label>Specific Heat Capacity (J/kg·K)</label><input type="number" step="any" value="${draft.solid_Cp}" data-action="set-new-material-field" data-field="solid_Cp" data-kind="number"></div>
          <div class="field-group"><label>Thermal Conductivity (W/m·K)</label><input type="number" step="any" value="${draft.solid_kappa}" data-action="set-new-material-field" data-field="solid_kappa" data-kind="number"></div>
        </div>
        <div class="footer-note" style="margin-top:6px;">Thermal conductivity stored in the library is always isotropic (scalar). For anisotropic [kx, ky, kz] overrides, set these per zone group in Step 4.</div>`}
      <div style="margin-top:12px; display:flex; gap:8px; flex-wrap:wrap;">
        <button type="button" class="btn btn-success" data-action="save-new-material">Save</button>
        <button type="button" class="btn btn-secondary" data-action="toggle-new-material">Cancel</button>
      </div>
    </div>
  `;
}

function renderStep4() {
  const fluidRegions = state.regions.fluids;
  const solidRegions = state.regions.solids;
  if (!uiState.newMaterialDraft) uiState.newMaterialDraft = defaultNewMaterialDraft();
  fluidRegions.forEach(region => ensureRegionData(region, 'fluid'));
  solidRegions.forEach(region => ensureRegionData(region, 'solid'));
  return `
    ${renderMessageHtml()}
    <div class="card">
      <div class="card-title">📚 Material Library</div>
      <details class="collapsible" ${uiState.expandedSections.materialLibrary ? 'open' : ''}>
        <summary data-action="toggle-section" data-section="materialLibrary">Material Library Panel</summary>
        <div class="details-body">
          <div class="field-row" style="margin-bottom:12px;">
            <label class="btn btn-secondary" for="custom-material-input">📂 Load custom_materials_library.json</label>
            <input type="file" id="custom-material-input" class="hidden" accept=".json,application/json">
            <button type="button" class="btn btn-primary" data-action="toggle-new-material">+ New Material</button>
            <button type="button" class="btn btn-success" data-action="export-custom-library">⬇ Export custom library</button>
          </div>
          ${renderMaterialLibraryTable()}
          ${uiState.expandedSections.newMaterial ? renderNewMaterialForm() : ''}
        </div>
      </details>
    </div>
    ${fluidRegions.map(region => `
      <div class="card">
        <div class="card-title">💨 ${escHtml(region)}</div>
        <div class="mat-kv">
          <div class="mat-kv-row">
            <label>Material</label>
            <select data-action="set-fluid-material" data-region="${escHtml(region)}">
              ${materialOptionsHtml('fluid', state.material_properties[region])}
            </select>
          </div>
        </div>
      </div>`).join('')}
    ${solidRegions.map(region => renderSolidMaterialSection(region)).join('') || '<div class="card"><div class="info-box">No solid regions loaded yet.</div></div>'}
  `;
}

function renderStep5() {
  const turb = state.turbulence;
  const rad = state.radiation;
  const mkRow = (label, control, unit = '') => `
    <div class="mat-kv-row">
      <label>${label}</label>
      ${control}
      ${unit ? `<span class="kv-value" style="margin-left:4px;color:#6b7280;font-size:13px;">${unit}</span>` : ''}
    </div>`;
  const numInput = (path, val, kind = 'number') =>
    `<input type="number" step="any" value="${val}" data-action="set-state" data-path="${path}" data-kind="${kind}" style="width:120px;">`;
  const selInput = (path, options) =>
    `<select data-action="set-state" data-path="${path}" data-kind="string" style="width:fit-content;">${options}</select>`;

  return `
    ${renderMessageHtml()}

    <div class="card">
      <div class="card-title">⚙️ Operating Parameters</div>
      <div class="mat-kv">
        ${!isIncompressibleSolver() ? mkRow('Gravity',
          renderVectorInputs('set-state', idx => `data-action="set-state" data-path="gravity.${idx}" data-kind="number"`, state.gravity, 'compact-kappa', false),
          'm/s²') : ''}
        ${mkRow('Reference Pressure',    numInput('reference_conditions.pressure',    state.reference_conditions.pressure),    'Pa')}
        ${mkRow('Reference Temperature', numInput('reference_conditions.temperature',  state.reference_conditions.temperature), 'K')}
      </div>
      <div class="footer-note" style="margin-top:10px;">Use <span class="code-inline">REF-TEMP</span> / <span class="code-inline">REF-PRES</span> aliases in boundary and initial conditions.</div>
    </div>

    <div class="card">
      <div class="card-title">🌪️ Turbulence</div>
      <div class="mat-kv">
        ${mkRow('Enable Turbulence',
          `<label style="font-weight:normal;text-transform:none;letter-spacing:0;"><input type="checkbox" data-action="set-state" data-path="turbulence.active" data-kind="bool" data-rerender="1" ${turb.active ? 'checked' : ''}> Active</label>`)}
        ${turb.active ? `
        ${mkRow('Type',   `<span class="kv-value">RANS</span> <span class="footer-note">(only supported type)</span>`)}
        ${mkRow('Model',  selInput('turbulence.RANS_config.model', [
          'kOmegaSST', 'kOmega', 'kEpsilon', 'RNGkEpsilon', 'realizableKE',
        ].map(v => `<option value="${v}" ${turb.RANS_config.model === v ? 'selected' : ''}>${v}</option>`).join('')))}
        ${mkRow('Pr<sub>t</sub>', numInput('turbulence.RANS_config.model_coeffs.Prt', turb.RANS_config.model_coeffs.Prt))}
        ${mkRow('Wall Function',         selInput('turbulence.RANS_config.wall_function', `
          <option value="Standard"  ${turb.RANS_config.wall_function === 'Standard'  ? 'selected' : ''}>Standard</option>
          <option value="Automatic" ${turb.RANS_config.wall_function === 'Automatic' ? 'selected' : ''}>Automatic</option>`))}
        ${!isIncompressibleSolver() ? mkRow('Thermal Wall Function', selInput('turbulence.RANS_config.thermal_wall_function', `
          <option value="Standard"    ${turb.RANS_config.thermal_wall_function === 'Standard'    ? 'selected' : ''}>Standard</option>
          <option value="Jayatilleke" ${turb.RANS_config.thermal_wall_function === 'Jayatilleke' ? 'selected' : ''}>Jayatilleke</option>`)) : ''}
        ` : ''}
      </div>
    </div>

    ${!isIncompressibleSolver() ? `
    <div class="card">
      <div class="card-title">☀️ Radiation</div>
      <div class="mat-kv">
        ${mkRow('Enable Radiation',
          `<label style="font-weight:normal;text-transform:none;letter-spacing:0;"><input type="checkbox" data-action="set-state" data-path="radiation.active" data-kind="bool" data-rerender="1" ${rad.active ? 'checked' : ''}> Active</label>`)}
        ${rad.active ? `
        ${mkRow('Model',
          `<select data-action="set-state" data-path="radiation.model" data-kind="string" data-rerender="1" style="width:fit-content;">
            <option value="fvDOM"      ${rad.model === 'fvDOM'      ? 'selected' : ''}>fvDOM</option>
            <option value="viewFactor" ${rad.model === 'viewFactor' ? 'selected' : ''}>viewFactor</option>
          </select>`)}
        ` : ''}
        ${rad.active && rad.model === 'fvDOM' ? `
        ${mkRow('nPhi',   numInput('radiation.model_coeffs.nPhi',   rad.model_coeffs.nPhi,   'int'))}
        ${mkRow('nTheta', numInput('radiation.model_coeffs.nTheta', rad.model_coeffs.nTheta, 'int'))}
        ` : ''}
        ${rad.active ? `
        ${mkRow('Tolerance',       numInput('radiation.model_coeffs.tolerance',   rad.model_coeffs.tolerance))}
        ${mkRow('Max Iterations',  numInput('radiation.model_coeffs.maxIter',     rad.model_coeffs.maxIter,   'int'))}
        ${mkRow('Solver Frequency',numInput('radiation.model_coeffs.solverFreq',  rad.model_coeffs.solverFreq,'int'))}
        ` : ''}
      </div>
    </div>
    ` : `
    <div class="card">
      <div class="card-title">ℹ️ Incompressible Isothermal Solver</div>
      <div class="footer-note" style="padding:8px 0;">
        <strong>simpleFoam / pimpleFoam</strong> solve only the momentum and turbulence equations.<br>
        No energy equation is solved — gravity, radiation, and thermal BCs are not applicable.
      </div>
    </div>
    `}
  `;
}

function getBC(region, patch) {
  state.boundary_conditions[region] = state.boundary_conditions[region] || {};
  return state.boundary_conditions[region][patch];
}

function setBC(region, patch, value) {
  state.boundary_conditions[region] = state.boundary_conditions[region] || {};
  state.boundary_conditions[region][patch] = value;
}

function ensureSolidBC(region, patch) {
  const existing = getBC(region, patch);
  if (!existing) setBC(region, patch, deepClone(BC_DEFAULTS['solid-wall']));
}

function ensureFluidBC(region, patch) {
  const existing = getBC(region, patch);
  if (!existing) setBC(region, patch, deepClone(BC_DEFAULTS['no-slip-wall']));
}

function getCHTBoundaryNames() {
  const names = new Set();
  Object.values(state.region_parts.cht_interfaces || {}).forEach(iface => {
    (iface.pair || []).forEach(p => { if (p.region && p.boundary) names.add(p.region + ':' + p.boundary); });
  });
  return names;
}

function faceZoneConfig(region, zone) {
  state.faceZone_conditions[region] = state.faceZone_conditions[region] || {};
  state.faceZone_conditions[region][zone] = state.faceZone_conditions[region][zone] || defaultFaceZoneConfig();
  return state.faceZone_conditions[region][zone];
}

function renderThermalLayers(region, patch, path, layers) {
  return `
    <div class="table-wrap">
      <table class="layer-table inline-table">
        <thead><tr><th>Thickness (m)</th><th>Conductivity (W/m·K)</th><th></th></tr></thead>
        <tbody>
          ${layers.length ? layers.map((layer, idx) => `
            <tr>
              <td><input type="number" step="any" value="${layer.thickness ?? 0}" data-action="set-bc" data-region="${escHtml(region)}" data-patch="${escHtml(patch)}" data-path="${escHtml(path)}.${idx}.thickness" data-kind="number"></td>
              <td><input type="number" step="any" value="${layer.conductivity ?? 0}" data-action="set-bc" data-region="${escHtml(region)}" data-patch="${escHtml(patch)}" data-path="${escHtml(path)}.${idx}.conductivity" data-kind="number"></td>
              <td><button type="button" class="del-btn" data-action="delete-bc-layer" data-region="${escHtml(region)}" data-patch="${escHtml(patch)}" data-path="${escHtml(path)}" data-index="${idx}">×</button></td>
            </tr>`).join('') : `<tr><td colspan="3" class="no-data">No layers</td></tr>`}
        </tbody>
      </table>
    </div>
    <div style="margin-top:8px;"><button type="button" class="btn btn-primary btn-xs" data-action="add-bc-layer" data-region="${escHtml(region)}" data-patch="${escHtml(patch)}" data-path="${escHtml(path)}">+ Add layer</button></div>
  `;
}

function renderVelocitySection(region, patch, basePath, velocity) {
  const v = velocity || { mode: 'components', value: [0, 0, 0] };
  const attrs = (field, kind = 'string') => `data-action="set-bc" data-region="${escHtml(region)}" data-patch="${escHtml(patch)}" data-path="${escHtml(basePath)}.${field}" data-kind="${kind}"`;
  const kv = (label, ctrl) => `<div class="bc-kv-row"><span class="bc-kv-label">${label}</span>${ctrl}</div>`;
  const numVelComponents = v.mode === 'components' ? 3 : 1;
  return `
    <div class="bc-block">
      <div class="bc-block-title">Velocity</div>
      ${kv('Mode', `<select ${attrs('mode')} data-rerender="1">
        <option value="components" ${v.mode === 'components' ? 'selected' : ''}>components</option>
        <option value="normal-magnitude" ${v.mode === 'normal-magnitude' ? 'selected' : ''}>normal-magnitude</option>
      </select>`)}
      ${v.mode === 'components'
        ? kv('Value [ux, uy, uz]', renderVectorInputs('set-bc', idx => `data-action="set-bc" data-region="${escHtml(region)}" data-patch="${escHtml(patch)}" data-path="${escHtml(basePath)}.value.${idx}" data-kind="number"`, Array.isArray(v.value) ? v.value : [0, 0, 0]))
        : kv('Magnitude', `<input type="number" step="any" value="${typeof v.value === 'number' ? v.value : 0}" ${attrs('value', 'number')}>`)}
      ${kv('⏱ Time-varying', `<label><input type="checkbox" data-action="toggle-bc-timevarying" data-region="${escHtml(region)}" data-patch="${escHtml(patch)}" data-path="${escHtml(basePath)}" ${v.time_varying ? 'checked' : ''}> Enable CSV</label>`)}
      ${v.time_varying ? renderCsvPanel(
        `bc|${region}|${patch}|${basePath}.time_varying`,
        v.time_varying,
        (field, kind) => `data-action="set-bc" data-region="${escHtml(region)}" data-patch="${escHtml(patch)}" data-path="${escHtml(basePath)}.time_varying.${field}" data-kind="${kind}" data-rerender="1"`,
        { numComponents: numVelComponents, label: 'Time-varying velocity' }
      ) : ''}
    </div>
  `;
}

function renderTurbulenceSection(region, patch, basePath, turbulence) {
  if (!state.turbulence.active) return '';
  const field2 = currentThermalSecondaryLabel();
  const t = turbulence || { mode: 'intensity-and-length-scale', intensity: 0.05, length_scale: 0.01 };
  const attrs = (field, kind = 'string') => `data-action="set-bc" data-region="${escHtml(region)}" data-patch="${escHtml(patch)}" data-path="${escHtml(basePath)}.${field}" data-kind="${kind}"`;
  const kv = (label, ctrl) => `<div class="bc-kv-row"><span class="bc-kv-label">${label}</span>${ctrl}</div>`;
  return `
    <div class="bc-block">
      <div class="bc-block-title">Turbulence</div>
      ${kv('Mode', `<select ${attrs('mode')} data-rerender="1">
        <option value="intensity-and-length-scale" ${t.mode === 'intensity-and-length-scale' ? 'selected' : ''}>intensity-and-length-scale</option>
        <option value="dirichlet" ${t.mode === 'dirichlet' ? 'selected' : ''}>dirichlet</option>
      </select>`)}
      ${t.mode === 'intensity-and-length-scale' ? `
        ${kv('Intensity', `<input type="number" step="any" min="0" max="1" value="${t.intensity ?? 0.05}" ${attrs('intensity', 'number')}>`)}
        ${kv('Length Scale (m)', `<input type="number" step="any" value="${t.length_scale ?? 0.01}" ${attrs('length_scale', 'number')}>`)}
      ` : `
        ${kv('k', `<input type="number" step="any" value="${t.k ?? 1}" ${attrs('k', 'number')}>`)}
        ${kv(escHtml(field2), `<input type="number" step="any" value="${t[field2] ?? 1000}" ${attrs(field2, 'number')}>`)}
      `}
    </div>
  `;
}

function renderThermalSection(region, patch, basePath, thermal, allowedModes, disabled = false) {
  if (disabled) {
    return `
    <div class="bc-block" style="opacity:0.45;pointer-events:none;">
      <div class="bc-block-title">Thermal</div>
      <div class="footer-note" style="padding:4px 0;">Not applicable — isothermal solver (no energy equation).</div>
    </div>`;
  }
  const t = thermal || { mode: 'temperature', value: state.reference_conditions.temperature };
  const attrs = (field, kind = 'string') => `data-action="set-bc" data-region="${escHtml(region)}" data-patch="${escHtml(patch)}" data-path="${escHtml(basePath)}.${field}" data-kind="${kind}"`;
  const kv = (label, ctrl) => `<div class="bc-kv-row"><span class="bc-kv-label">${label}</span>${ctrl}</div>`;
  return `
    <div class="bc-block">
      <div class="bc-block-title">Thermal</div>
      ${kv('Mode', `<select ${attrs('mode')} data-rerender="1">
        ${allowedModes.map(mode => `<option value="${escHtml(mode)}" ${t.mode === mode ? 'selected' : ''}>${escHtml(mode)}</option>`).join('')}
      </select>`)}
      ${t.mode === 'temperature' ? `
        ${kv('Value (K)', `<input type="number" step="any" value="${typeof t.value === 'number' ? t.value : state.reference_conditions.temperature}" ${attrs('value', 'number')} ${t.time_varying ? 'disabled' : ''}>`)}
        ${kv('⏱ Time-varying', `<label><input type="checkbox" data-action="toggle-bc-timevarying" data-region="${escHtml(region)}" data-patch="${escHtml(patch)}" data-path="${escHtml(basePath)}" ${t.time_varying ? 'checked' : ''}> Enable CSV</label>`)}
      ` : ''}
      ${t.mode === 'heat-flux' ? kv('Heat Flux (W/m²)', `<input type="number" step="any" value="${t.value ?? 0}" ${attrs('value', 'number')}>`) : ''}
      ${t.mode === 'heat-transfer-rate' ? kv('Heat Transfer Rate (W)', `<input type="number" step="any" value="${t.value ?? 0}" ${attrs('value', 'number')}>`) : ''}
      ${t.mode === 'heat-transfer-coefficient' ? `
        ${kv('htc (W/m²·K)', `<input type="number" step="any" value="${t.htc ?? 0}" ${attrs('htc', 'number')}>`)}
        ${kv('Ambient Temp (K)', `<input type="number" step="any" value="${t.ambient_temperature ?? state.reference_conditions.temperature}" ${attrs('ambient_temperature', 'number')}>`)}
        ${kv('Outer emissivity', `<input type="number" step="any" value="${t.outer_emissivity ?? 0}" ${attrs('outer_emissivity', 'number')}>`)}
      ` : ''}
      ${t.time_varying ? renderCsvPanel(
        `bc|${region}|${patch}|${basePath}.time_varying`,
        t.time_varying,
        (field, kind) => `data-action="set-bc" data-region="${escHtml(region)}" data-patch="${escHtml(patch)}" data-path="${escHtml(basePath)}.time_varying.${field}" data-kind="${kind}" data-rerender="1"`,
        { numComponents: 1, label: 'Time-varying temperature' }
      ) : ''}
      ${(t.mode === 'heat-transfer-coefficient') ? `<div style="margin-top:10px;">${renderThermalLayers(region, patch, basePath + '.thermal_layers', t.thermal_layers || [])}</div>` : ''}
      ${(t.mode === 'adiabatic') ? '<div class="footer-note">No configuration required.</div>' : ''}
    </div>
  `;
}

function renderRadiationSection(region, patch, bc) {
  const attrs = `data-action="set-bc" data-region="${escHtml(region)}" data-patch="${escHtml(patch)}" data-path="emissivity" data-kind="number"`;
  const kv = (label, ctrl) => `<div class="bc-kv-row"><span class="bc-kv-label">${label}</span>${ctrl}</div>`;
  return `
    <div class="bc-block">
      <div class="bc-block-title">☀️ Radiation</div>
      ${kv('Emissivity', `<input type="number" step="0.01" min="0" max="1" value="${bc.emissivity ?? 0.9}" ${attrs}>`)}
      <div class="footer-note">Written to <code>boundaryRadiationProperties</code> (= absorptivity, grey body). Range: [0, 1].</div>
    </div>`;
}

function renderFluidBCConfig(region, patch, bc) {
  if (!bc) return '<div class="info-box">Select a BC type to configure this patch.</div>';
  const kv = (label, ctrl) => `<div class="bc-kv-row"><span class="bc-kv-label">${label}</span>${ctrl}</div>`;
  const thermalDisabled = isIncompressibleSolver();
  if (bc.type === 'velocity-inlet') {
    return `<div class="bc-section">${renderVelocitySection(region, patch, 'velocity', bc.velocity)}${renderThermalSection(region, patch, 'thermal', bc.thermal, ['temperature'], thermalDisabled)}${renderTurbulenceSection(region, patch, 'turbulence', bc.turbulence)}</div>`;
  }
  if (bc.type === 'total-pressure-inlet') {
    return `<div class="bc-section">
      <div class="bc-block">
        <div class="bc-block-title">Pressure</div>
        ${kv('Total Pressure (Pa gauge)', `<input type="number" step="any" value="${bc.total_pressure ?? 0}" data-action="set-bc" data-region="${escHtml(region)}" data-patch="${escHtml(patch)}" data-path="total_pressure" data-kind="number">`)}
      </div>
      ${renderThermalSection(region, patch, 'thermal', bc.thermal, ['temperature'], thermalDisabled)}
      ${renderTurbulenceSection(region, patch, 'turbulence', bc.turbulence)}
    </div>`;
  }
  if (bc.type === 'pressure-outlet') {
    return `<div class="bc-section">
      <div class="bc-block">
        <div class="bc-block-title">Outlet</div>
        ${kv('Pressure (Pa gauge)', `<input type="number" step="any" value="${bc.pressure ?? 0}" data-action="set-bc" data-region="${escHtml(region)}" data-patch="${escHtml(patch)}" data-path="pressure" data-kind="number">`)}
        ${kv('prevent_backflow', `<label><input type="checkbox" data-action="set-bc" data-region="${escHtml(region)}" data-patch="${escHtml(patch)}" data-path="prevent_backflow" data-kind="bool" data-rerender="1" ${bc.prevent_backflow ? 'checked' : ''}> true</label>`)}
      </div>
      ${!bc.prevent_backflow ? `<div class="bc-block-title" style="margin:12px 0 6px;">Backflow Conditions</div>${renderThermalSection(region, patch, 'backflow_conditions.thermal', bc.backflow_conditions?.thermal || defaultBackflow().thermal, ['temperature', 'heat-flux', 'adiabatic'], thermalDisabled)}${renderTurbulenceSection(region, patch, 'backflow_conditions.turbulence', bc.backflow_conditions?.turbulence || defaultBackflow().turbulence)}` : ''}
    </div>`;
  }
  if (bc.type === 'no-slip-wall') {
    return `<div class="bc-section">
      ${renderThermalSection(region, patch, 'thermal', bc.thermal, ['temperature', 'heat-flux', 'heat-transfer-rate', 'heat-transfer-coefficient', 'adiabatic'], thermalDisabled)}
      ${!thermalDisabled ? renderRadiationSection(region, patch, bc) : ''}
    </div>`;
  }
  if (bc.type === 'slip-wall') {
    return !thermalDisabled
      ? `<div class="bc-section">${renderRadiationSection(region, patch, bc)}</div>`
      : '<div class="info-box">No configuration required.</div>';
  }
  if (bc.type === 'symmetry' || bc.type === 'empty') {
    return '<div class="info-box">No configuration required.</div>';
  }
  return '<div class="info-box">No configuration required.</div>';
}

function renderSolidBCConfig(region, patch, bc) {
  if (CONSTRAINT_TYPES.has(bc.type)) return '<div class="info-box">No configuration required — OpenFOAM sets field BCs automatically for constraint types via <code>setConstraintTypes</code>.</div>';
  return `<div class="bc-section">${renderThermalSection(region, patch, 'thermal', bc.thermal, ['temperature', 'heat-flux', 'heat-transfer-rate', 'heat-transfer-coefficient', 'adiabatic'])}</div>`;
}

function renderBCCopyPanel(region) {
  const panel = uiState.bcCopyPanel;
  if (!panel.open || panel.sourceRegion !== region) return '';
  const { sourcePatch, selected } = panel;
  const rp = state.region_parts[region] || {};
  const chtBoundaries = getCHTBoundaryNames();
  const namedPatches = (rp.boundaries || []).filter(p => !chtBoundaries.has(region + ':' + p));
  const targets = ['__default__', ...namedPatches].filter(p => p !== sourcePatch);
  const bcState = state.boundary_conditions[region] || {};
  const sourceBC = bcState[sourcePatch];
  return `
    <div class="zone-copy-overlay" id="bc-copy-overlay">
      <div class="zone-copy-panel">
        <div class="zone-copy-title">⎘ Copy BC from: <code>${escHtml(sourcePatch)}</code></div>
        <div style="font-size:13px;color:#555;margin-bottom:12px;">Type: <strong>${escHtml(sourceBC?.type || '—')}</strong></div>
        <div style="font-size:13px;font-weight:600;margin-bottom:8px;color:#334155;">Apply to:</div>
        ${targets.length === 0 ? `<div class="info-box">No other patches available.</div>` : `
          <div style="max-height:220px;overflow-y:auto;border:1px solid #e2e8f0;border-radius:6px;padding:8px 12px;">
            ${targets.map(p => {
              const alreadySet = p === '__default__' ? true : !!bcState[p];
              return `<label style="display:flex;align-items:center;gap:8px;padding:3px 0;cursor:pointer;">
                <input type="checkbox" data-action="toggle-bc-copy-select" data-patch="${escHtml(p)}" ${selected.includes(p) ? 'checked' : ''}>
                <span class="code-inline" style="font-size:12px;">${escHtml(p === '__default__' ? '__default__ (all unassigned)' : p)}</span>
                ${alreadySet ? `<span style="font-size:11px;padding:1px 6px;border-radius:999px;background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;">⚠ will overwrite</span>` : ''}
              </label>`;
            }).join('')}
          </div>`}
        <div style="margin-top:16px;display:flex;gap:10px;justify-content:flex-end;">
          <button type="button" class="btn btn-secondary" data-action="close-bc-copy-panel">Cancel</button>
          <button type="button" class="btn btn-primary" data-action="apply-bc-copy" ${selected.length === 0 ? 'disabled' : ''}>Apply ✓</button>
        </div>
      </div>
    </div>`;
}

function renderPatchTable(region, type) {
  const rp = state.region_parts[region] || { boundaries: [], faceZones: [] };
  const chtBoundaries = getCHTBoundaryNames();
  const allPatches = (rp.boundaries || []).filter(p => !chtBoundaries.has(region + ':' + p));
  // Physics BCs (available on both __default__ and named patches)
  const regularOptions = type === 'fluid'
    ? ['velocity-inlet', 'total-pressure-inlet', 'pressure-outlet', 'no-slip-wall', 'slip-wall']
    : ['solid-wall'];
  // Constraint types — only on named patches, NOT on __default__
  const constraintOptionsList = [
    'cyclic', 'cyclicAMI', 'cyclicACMI', 'cyclicSlip', 'empty',
    'nonuniformTransformCyclic', 'symmetryPlane', 'symmetry', 'wedge', 'overset'
  ];
  const bcState = state.boundary_conditions[region] || {};

  const renderRow = (patch, isDefault) => {
    const bc = bcState[patch] || null;
    const hasConfig = isDefault ? true : !!bc;
    const expanded = !!(uiState.expandedPatches[region]?.[patch]);
    const borderColor = isDefault ? '#d0d5dd' : (hasConfig ? '#4a86e8' : '#d0d5dd');
    const bgColor = isDefault ? '#f5f7fa' : (hasConfig ? '#f0f5ff' : '#fafafa');
    const typeVal = hasConfig ? (bc?.type || '') : '';
    const isConstraint = CONSTRAINT_TYPES.has(typeVal);
    return `
      <div style="border:1px solid ${borderColor};border-radius:6px;margin-bottom:6px;overflow:hidden;">
        <div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:${bgColor};">
          <div style="flex:1;min-width:0;">
            <span style="font-size:12px;font-weight:700;color:#1e293b;">${escHtml(patch)}</span>
            ${isDefault
              ? `<span style="font-size:11px;color:#9ca3af;margin-left:6px;">(covers all unassigned patches)</span>`
              : (!hasConfig ? `<span style="font-size:11px;color:#9ca3af;margin-left:6px;">(inherits __default__)</span>` : '')}
          </div>
          <select data-action="set-bc-type" data-region="${escHtml(region)}" data-patch="${escHtml(patch)}" data-region-type="${escHtml(type)}" style="font-size:12px;">
            ${!isDefault ? `<option value="" ${!hasConfig ? 'selected' : ''}>-- inherit default --</option>` : ''}
            <optgroup label="Physics BCs">
              ${regularOptions.map(opt => `<option value="${escHtml(opt)}" ${typeVal === opt ? 'selected' : ''}>${escHtml(opt)}</option>`).join('')}
            </optgroup>
            ${!isDefault ? `<optgroup label="Constraint types">
              ${constraintOptionsList.map(opt => `<option value="${escHtml(opt)}" ${typeVal === opt ? 'selected' : ''}>${escHtml(opt)}</option>`).join('')}
            </optgroup>` : ''}
          </select>
          <button type="button" class="btn btn-secondary btn-xs" data-action="toggle-patch-expand" data-region="${escHtml(region)}" data-patch="${escHtml(patch)}">${expanded ? '▲' : '▼'} Configure</button>
        </div>
        ${expanded ? `
          <div style="padding:12px;border-top:1px solid #e8eaf0;">
            ${hasConfig
              ? (isConstraint
                  ? '<div class="info-box">No configuration required — OpenFOAM sets field BCs automatically for constraint types via <code>setConstraintTypes</code>.</div>'
                  : (type === 'fluid' ? renderFluidBCConfig(region, patch, bc || bcState['__default__']) : renderSolidBCConfig(region, patch, bc || bcState['__default__'])))
              : `<div class="info-box">This patch inherits <strong>__default__</strong>. Select a BC type above to configure it explicitly.</div>`}
            ${hasConfig ? `
              <div style="margin-top:10px;padding-top:8px;border-top:1px solid #e8eaf0;">
                <button type="button" class="btn btn-secondary btn-sm" data-action="open-bc-copy-panel" data-region="${escHtml(region)}" data-patch="${escHtml(patch)}">⎘ Copy to patches →</button>
              </div>` : ''}
          </div>` : ''}
      </div>`;
  };

  return `
    ${renderBCCopyPanel(region)}
    <div class="card" style="width:fit-content;min-width:500px;">
      <div class="card-title">${type === 'fluid' ? '🌊' : '🧱'} ${escHtml(region)}</div>
      <div class="footer-note" style="margin-bottom:10px;"><strong>__default__</strong> applies to all unassigned patches. Configure named patches explicitly and use ⎘ Copy to replicate settings.</div>
      ${renderRow('__default__', true)}
      ${allPatches.length > 0 ? `
        <div style="font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:0.06em;margin:10px 0 6px;padding-bottom:4px;border-bottom:1px solid #e5e7eb;">Named Patches</div>
        ${allPatches.map(p => renderRow(p, false)).join('')}` : ''}
    </div>`;
}

function renderStep6() {
  const chtIfaceNames = Object.keys(state.region_parts.cht_interfaces || {});
  const hasCHT = chtIfaceNames.length > 0;
  const regionTabs = [...state.regions.fluids, ...state.regions.solids];
  const allTabs = hasCHT ? [...regionTabs, '__cht__'] : regionTabs;
  const activeTab = getFirstTab('step6', allTabs);
  return `
    ${renderMessageHtml()}
    ${renderTabs('step6', allTabs, activeTab)}
    ${activeTab === '__cht__'
      ? renderCHTBoundaryTab()
      : (activeTab ? renderPatchTable(activeTab, regionType(activeTab)) : '<div class="card"><div class="info-box">No regions loaded yet.</div></div>')}
  `;
}

function renderStep7() {
  const fluidRegions = state.regions.fluids || [];
  if (fluidRegions.length === 0) {
    return `${renderMessageHtml()}<div class="card"><div class="info-box">No fluid regions loaded yet. FaceZone conditions only apply to fluid regions.</div></div>`;
  }
  const activeTab = getFirstTab('step7', fluidRegions);
  const region = activeTab;
  const rp = state.region_parts[region] || { boundaries: [], faceZones: [] };
  const allFaceZones = rp.faceZones || [];
  const activeFzs = uiState.activeFaceZones[region] || [];
  const remainingFzs = allFaceZones.filter(z => !activeFzs.includes(z));

  const fzRows = activeFzs.map(zone => {
    const cfg = faceZoneConfig(region, zone);
    const fzKey = '__fz__' + zone;
    const fzExpanded = !!(uiState.expandedPatches[region]?.[fzKey]);
    return `
      <div style="width:fit-content;min-width:420px;border:1px solid #4a86e8;border-radius:6px;margin-bottom:8px;overflow:hidden;">
        <div style="display:flex;align-items:center;gap:8px;padding:7px 12px;background:#f0f5ff;">
          <span class="code-inline" style="font-size:13px;flex:1;">${escHtml(zone)}</span>
          <button type="button" class="btn btn-secondary btn-xs" data-action="toggle-patch-expand" data-region="${escHtml(region)}" data-patch="${escHtml(fzKey)}">${fzExpanded ? '▲' : '▼'} Configure</button>
          <button type="button" class="del-btn" data-action="remove-active-facezone" data-region="${escHtml(region)}" data-zone="${escHtml(zone)}">×</button>
        </div>
        ${fzExpanded ? `
        <div style="padding:12px;border-top:1px solid #c5d8f8;">
          <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:10px;">
            <div style="display:flex;align-items:center;gap:8px;">
              <span style="font-size:0.78rem;font-weight:700;color:#4b5563;min-width:100px;flex-shrink:0;">Type</span>
              <select data-action="set-facezone" data-region="${escHtml(region)}" data-zone="${escHtml(zone)}" data-path="type" style="font-size:13px;">
                <option value="fan" ${cfg.type === 'fan' ? 'selected' : ''}>fan</option>
              </select>
            </div>
            <div style="display:flex;align-items:center;gap:8px;">
              <span style="font-size:0.78rem;font-weight:700;color:#4b5563;min-width:100px;flex-shrink:0;">Patch name</span>
              <input type="text" value="${escHtml(cfg.patch_name || '')}" data-action="set-facezone" data-region="${escHtml(region)}" data-zone="${escHtml(zone)}" data-path="patch_name" style="font-size:13px;width:180px;">
            </div>
          </div>
          ${renderCsvPanel(
            `fz|${region}|${zone}|fan_curve`,
            cfg.fan_curve,
            (field, kind) => `data-action="set-facezone" data-region="${escHtml(region)}" data-zone="${escHtml(zone)}" data-path="fan_curve.${field}" data-kind="${kind}" data-rerender="1"`,
            { numComponents: 1, label: 'Fan Curve', refLabel: 'Q (m\u00B3/s)', compLabels: ['\u0394p (Pa)'] }
          )}
        </div>` : ''}
      </div>`;
  }).join('');

  const addRow = remainingFzs.length > 0 ? `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
      <select id="add-fz-select-${escHtml(region)}" style="font-size:12px;">
        <option value="">-- select faceZone --</option>
        ${remainingFzs.map(z => `<option value="${escHtml(z)}">${escHtml(z)}</option>`).join('')}
      </select>
      <button type="button" class="btn btn-primary btn-sm" data-action="add-active-facezone" data-region="${escHtml(region)}">+ Add</button>
    </div>` : '';

  const emptyMsg = allFaceZones.length === 0
    ? '<div class="info-box">No faceZones found for this region. Import checkMesh log in Step 2 to populate faceZones.</div>'
    : (activeFzs.length === 0
        ? '<div class="footer-note">No active faceZone conditions. Select one above and click Add.</div>'
        : '');

  return `
    ${renderMessageHtml()}
    ${fluidRegions.length > 1 ? renderTabs('step7', fluidRegions, activeTab) : ''}
    <div class="card">
      <div class="card-title">🌀 FaceZone Conditions — ${escHtml(region)}</div>
      <div class="footer-note" style="margin-bottom:10px;">
        Configure internal surface fan conditions (baffles). After running <code>setup_case.py</code>, execute
        <code>createBaffles -overwrite</code> to apply. Only <strong>fan</strong> type is currently supported.
      </div>
      ${addRow}
      ${emptyMsg}
      ${fzRows}
    </div>
  `;
}

function renderCHTBoundaryTab() {
  const names = Object.keys(state.region_parts.cht_interfaces || {});
  const isCompressible = !isIncompressibleSolver();
  return `
    <div class="card">
      <div class="card-title">🔗 CHT Interface Boundaries</div>
      ${names.length ? names.map(name => {
        const def = state.region_parts.cht_interfaces?.[name];
        const iface = state.boundary_conditions.cht_interfaces?.[name] || {};
        return `
          <div class="bc-block" style="margin-bottom:12px;">
            <div class="bc-block-title">${escHtml(name)} — ${escHtml(def?.pair?.[0]?.boundary || '')} ↔ ${escHtml(def?.pair?.[1]?.boundary || '')}</div>
            ${renderLayerRows(name)}
            ${isCompressible ? `
              <div class="bc-block" style="margin-top:8px;">
                <div class="bc-block-title">☀️ Radiation</div>
                <div class="bc-kv-row">
                  <span class="bc-kv-label">Emissivity (fluid-side)</span>
                  <input type="number" step="0.01" min="0" max="1" value="${iface.emissivity ?? 0.9}"
                    data-action="set-cht-emissivity" data-interface="${escHtml(name)}" data-kind="number">
                </div>
                <div class="footer-note">Written to <code>boundaryRadiationProperties</code> (= absorptivity, grey body). Range: [0, 1].</div>
              </div>` : ''}
          </div>`;
      }).join('') : '<div class="info-box">No CHT interfaces defined yet.</div>'}
    </div>
  `;
}

function renderStep8() {
  const tabs = getAllRegions();
  const activeTab = getFirstTab('step8', tabs);
  const items = Array.isArray(state.fv_options[activeTab]) ? state.fv_options[activeTab] : [];
  const zones = state.region_parts[activeTab]?.cellZones || [];
  return `
    ${renderMessageHtml()}
    ${renderTabs('step8', tabs, activeTab)}
    <div class="card" style="width:fit-content;min-width:420px;">
      <div class="card-title">🔥 fv_options — ${escHtml(activeTab || '')}</div>
      <div class="table-wrap">
        <table style="font-size:12px;">
          <thead><tr><th>Type</th><th>cellZone</th><th>Mode</th><th>Value</th><th></th></tr></thead>
          <tbody>
            ${activeTab ? (items.length ? items.map((item, idx) => `
              <tr>
                <td><select style="font-size:12px;" data-action="set-fv-option" data-region="${escHtml(activeTab)}" data-index="${idx}" data-field="type"><option value="heat-source" selected>heat-source</option></select></td>
                <td><select style="font-size:12px;" data-action="set-fv-option" data-region="${escHtml(activeTab)}" data-index="${idx}" data-field="cellZone"><option value="">(whole region)</option>${zones.map(z => `<option value="${escHtml(z)}" ${item.cellZone === z ? 'selected' : ''}>${escHtml(z)}</option>`).join('')}</select></td>
                <td><select style="font-size:12px;" data-action="set-fv-option" data-region="${escHtml(activeTab)}" data-index="${idx}" data-field="mode"><option value="absolute" ${item.mode === 'absolute' ? 'selected' : ''}>absolute</option><option value="specific" ${item.mode === 'specific' ? 'selected' : ''}>specific</option></select></td>
                <td><input type="number" step="any" style="width:100px;font-size:12px;" value="${item.value ?? 0}" data-action="set-fv-option" data-region="${escHtml(activeTab)}" data-index="${idx}" data-field="value" data-kind="number"></td>
                <td><button type="button" class="del-btn" data-action="delete-fv-option" data-region="${escHtml(activeTab)}" data-index="${idx}">×</button></td>
              </tr>`).join('') : '<tr><td colspan="5" class="no-data">No source terms defined.</td></tr>') : '<tr><td colspan="5" class="no-data">No regions loaded.</td></tr>'}
          </tbody>
        </table>
      </div>
      ${activeTab ? `<div style="margin-top:8px;"><button type="button" class="btn btn-primary btn-sm" data-action="add-fv-option" data-region="${escHtml(activeTab)}">+ Add source</button></div>` : ''}
    </div>
  `;
}

function renderStep9() {
  const tabs = getAllRegions();
  const activeTab = getFirstTab('step9', tabs);
  const type = regionType(activeTab);
  const ic = state.initial_conditions[activeTab] || (type === 'fluid' ? defaultFluidIC() : defaultSolidIC());
  const field2 = currentThermalSecondaryLabel();
  const kv = (label, ctrl, unit = '') => `
    <div class="bc-kv-row">
      <span class="bc-kv-label">${label}</span>
      ${ctrl}
      ${unit ? `<span style="font-size:12px;color:#6b7280;margin-left:4px;">${unit}</span>` : ''}
    </div>`;
  const icAttr = (path) => `data-action="set-ic" data-region="${escHtml(activeTab)}" data-path="${path}" data-kind="number"`;
  const tVal = typeof ic.T === 'number' ? ic.T : state.reference_conditions.temperature;
  const tInput = `<input type="number" step="any" value="${tVal}" ${icAttr('T')} ${ic.T === 'REF-TEMP' ? 'disabled' : ''}>
    <label style="display:flex;align-items:center;gap:4px;margin-left:8px;font-size:12px;white-space:nowrap;">
      <input type="checkbox" data-action="toggle-ic-ref-temp" data-region="${escHtml(activeTab)}" ${ic.T === 'REF-TEMP' ? 'checked' : ''}> REF-TEMP
    </label>`;

  const fluidRows = !activeTab ? '' : `
    ${kv('Velocity [ux, uy, uz]', renderVectorInputs('set-ic', idx => `data-action="set-ic" data-region="${escHtml(activeTab)}" data-path="U.${idx}" data-kind="number"`, ic.U || [0,0,0]), 'm/s')}
    ${kv('Pressure (gauge)', `<input type="number" step="any" value="${ic.p ?? 0}" ${icAttr('p')}>`, 'Pa')}
    ${kv('Temperature', `<div style="display:flex;align-items:center;">${tInput}</div>`, 'K')}
    ${state.turbulence.active ? `
    ${kv('k', `<input type="number" step="any" value="${ic.k ?? 1.0}" ${icAttr('k')}>`, 'm²/s²')}
    ${kv(escHtml(field2), `<input type="number" step="any" value="${ic[field2] ?? (field2 === 'epsilon' ? 1.0 : 1000)}" ${icAttr(field2)}>`, '1/s')}` : ''}`;

  const solidRows = !activeTab ? '' : `
    ${kv('Temperature', `<div style="display:flex;align-items:center;">${tInput}</div>`, 'K')}`;

  return `
    ${renderMessageHtml()}
    ${renderTabs('step9', tabs, activeTab)}
    <div class="card" style="width:fit-content;min-width:420px;">
      <div class="card-title">🧊 Initial Conditions — ${escHtml(activeTab || '')}</div>
      <div style="font-size:11px;color:#9ca3af;margin-bottom:10px;">Method: uniform</div>
      ${activeTab ? (type === 'fluid' ? fluidRows : solidRows) : '<div class="no-data">No regions loaded.</div>'}
    </div>
  `;
}

function renderStep10() {
  const tabs = getAllRegions();
  const activeTab = getFirstTab('step10', tabs);
  const items = Array.isArray(state.function_objects[activeTab]) ? state.function_objects[activeTab] : [];
  const cellZones = state.region_parts[activeTab]?.cellZones || [];
  const patches = state.region_parts[activeTab]?.boundaries || [];
  const isSolidRegion = regionType(activeTab) === 'solid';

  // Types not applicable to solid regions (no density/flux/velocity fields)
  const SOLID_FORBIDDEN_TYPES = new Set(['mass_average', 'mass_integral', 'mass_flow_rate', 'volume_flow_rate']);
  const ALL_FO_TYPES = ['volume_average','volume_integral','volume_min','volume_max','volume_sum',
     'mass_average','mass_integral','area_average','area_integral',
     'surface_min','surface_max','surface_sum','cellZone_average','mass_flow_rate','volume_flow_rate'];
  const availableFoTypes = isSolidRegion
    ? ALL_FO_TYPES.filter(t => !SOLID_FORBIDDEN_TYPES.has(t))
    : ALL_FO_TYPES;

  // Helper: check if a cellZone_average already exists for a given field in this region
  const czAvgExistsForField = (field) => items.some(it => it.type === 'cellZone_average' && it.field === field);

  // Build type options for a row, disabling cellZone_average if one already exists for that field
  const typeOptions = (currentType, currentField) =>
    availableFoTypes
    .map(opt => {
      const isDuplicate = opt === 'cellZone_average' && opt !== currentType && czAvgExistsForField(currentField);
      return `<option value="${escHtml(opt)}" ${currentType === opt ? 'selected' : ''} ${isDuplicate ? 'disabled' : ''}>${escHtml(opt)}${isDuplicate ? ' (already defined)' : ''}</option>`;
    }).join('');

  return `
    ${renderMessageHtml()}
    ${renderTabs('step10', tabs, activeTab)}
    <div class="card">
      <div class="card-title">📈 Function Objects — ${escHtml(activeTab || '')}</div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Type</th><th>Field</th><th>Scope</th><th>Scope Name</th><th></th></tr></thead>
          <tbody>
            ${activeTab ? (items.length ? items.map((item, idx) => {
              const isMassFlowRate = item.type === 'mass_flow_rate';
              const isVolFlowRate  = item.type === 'volume_flow_rate';
              const isImplicitField = isMassFlowRate || isVolFlowRate;
              const isCzAvg = item.type === 'cellZone_average';
              const isSurfaceOp = item.type.startsWith('area_') || item.type.startsWith('surface_') || isMassFlowRate || isVolFlowRate;
              const rawScope = item.cuttingPlane ? 'cuttingPlane' : (item.cellZone ? 'cellZone' : (item.patch ? 'patch' : (item.faceZone ? 'faceZone' : 'whole-region')));
              const scope = isSurfaceOp
                ? (['patch','faceZone','cuttingPlane'].includes(rawScope) ? rawScope : 'patch')
                : (['whole-region','cellZone'].includes(rawScope) ? rawScope : 'whole-region');
              const scopeName = item.cuttingPlane?.name || item.cellZone || item.patch || item.faceZone || '';
              const faceZones = state.region_parts[activeTab]?.faceZones || [];
              const scopeOptions = scope === 'cellZone' ? cellZones : (scope === 'faceZone' ? faceZones : patches);
              const volScopeHtml = `<option value="whole-region" ${scope==='whole-region'?'selected':''}>whole-region</option><option value="cellZone" ${scope==='cellZone'?'selected':''}>cellZone</option>`;
              const srfScopeHtml = `<option value="patch" ${scope==='patch'?'selected':''}>patch</option><option value="faceZone" ${scope==='faceZone'?'selected':''}>faceZone</option><option value="cuttingPlane" ${scope==='cuttingPlane'?'selected':''}>cuttingPlane</option>`;
              const isCuttingPlane = scope === 'cuttingPlane';
              const cp = item.cuttingPlane || { name: '', point: [0, 0, 0], normal: [1, 0, 0] };

              if (isCzAvg) {
                // cellZone_average row: fixed scope label + Configure expand/collapse
                const selectedZones = Array.isArray(item.cellZones) ? item.cellZones : [];
                const expandKey = `${activeTab}:${idx}`;
                const isExpanded = !!uiState.czAvgExpanded[expandKey];
                const count = selectedZones.length;
                const scopeNameCell = cellZones.length === 0
                  ? `<span style="color:#aaa;font-size:12px;">No cellZones in mesh</span>`
                  : `<span style="margin-right:6px;">${count} zone${count !== 1 ? 's' : ''}</span>
                     <button type="button" class="btn btn-sm" style="padding:2px 8px;font-size:12px;"
                       data-action="toggle-czavg-expand" data-region="${escHtml(activeTab)}" data-index="${idx}">
                       ${isExpanded ? 'Configure ▲' : 'Configure ▼'}
                     </button>
                     ${isExpanded ? `<div style="margin-top:6px;">
                       ${cellZones.map(z => `<label style="display:block;font-size:12px;cursor:pointer;">
                         <input type="checkbox" data-action="toggle-czavg-zone"
                           data-region="${escHtml(activeTab)}" data-index="${idx}" data-zone="${escHtml(z)}"
                           ${selectedZones.includes(z) ? 'checked' : ''}> ${escHtml(z)}
                       </label>`).join('')}
                     </div>` : ''}`;
                // Field dropdown — disable fields that already have a cellZone_average (except this row's own field)
                // Solid regions: lock to temperature only
                const fluidFoFields = ['temperature','pressure','velocity','density','yPlus','wallHeatFlux',
                  ...(state.turbulence.active ? ['k','omega','epsilon'] : [])];
                const fieldOptions = isSolidRegion
                  ? ['temperature','wallHeatFlux']
                    .map(opt => {
                      const conflict = opt !== item.field && items.some((it, i) => i !== idx && it.type === 'cellZone_average' && it.field === opt);
                      return `<option value="${escHtml(opt)}" ${item.field === opt ? 'selected' : ''} ${conflict ? 'disabled' : ''}>${escHtml(opt)}${conflict ? ' (used)' : ''}</option>`;
                    }).join('')
                  : fluidFoFields
                    .map(opt => {
                      const conflict = opt !== item.field && items.some((it, i) => i !== idx && it.type === 'cellZone_average' && it.field === opt);
                      return `<option value="${escHtml(opt)}" ${item.field === opt ? 'selected' : ''} ${conflict ? 'disabled' : ''}>${escHtml(opt)}${conflict ? ' (used)' : ''}</option>`;
                    }).join('');
                return `<tr>
                  <td><select data-action="set-monitor-type" data-region="${escHtml(activeTab)}" data-index="${idx}">${typeOptions(item.type, item.field)}</select></td>
                  <td><select data-action="set-monitor-field" data-region="${escHtml(activeTab)}" data-index="${idx}">${fieldOptions}</select></td>
                  <td><span style="font-size:12px;color:#555;font-style:italic;">cellZones<br>(fixed)</span></td>
                  <td>${scopeNameCell}</td>
                  <td><button type="button" class="del-btn" data-action="delete-monitor" data-region="${escHtml(activeTab)}" data-index="${idx}">×</button></td>
                </tr>`;
              }

              return `<tr>
                <td><select data-action="set-monitor-type" data-region="${escHtml(activeTab)}" data-index="${idx}">${typeOptions(item.type, item.field)}</select></td>
                <td>${isImplicitField ? `<span class="muted" style="font-style:italic;">${isMassFlowRate ? 'phi' : 'U'} (implicit)</span>` : `<select data-action="set-monitor-field" data-region="${escHtml(activeTab)}" data-index="${idx}">${(isSolidRegion ? ['temperature','wallHeatFlux'] : ['temperature','pressure','velocity','density','yPlus','wallHeatFlux',...(state.turbulence.active ? ['k','omega','epsilon'] : [])]).map(opt => `<option value="${escHtml(opt)}" ${item.field === opt ? 'selected' : ''}>${escHtml(opt)}</option>`).join('')}</select>`}</td>
                <td><select data-action="set-monitor-scope" data-region="${escHtml(activeTab)}" data-index="${idx}" data-rerender="1">${isSurfaceOp ? srfScopeHtml : volScopeHtml}</select></td>
                <td>${scope === 'whole-region'
                  ? '<span class="muted">—</span>'
                  : isCuttingPlane
                    ? `<div style="font-size:12px;line-height:2;">
                        <label style="display:flex;align-items:center;gap:4px;">Name:&nbsp;<input type="text" data-action="set-cutting-plane-name" data-region="${escHtml(activeTab)}" data-index="${idx}" value="${escHtml(cp.name)}" style="width:130px;font-size:12px;"></label>
                        <label style="display:flex;align-items:center;gap:4px;">Point:&nbsp;
                          <input type="number" step="any" data-action="set-cutting-plane-coord" data-region="${escHtml(activeTab)}" data-index="${idx}" data-which="point" data-axis="0" value="${cp.point[0]}" style="width:55px;font-size:12px;">
                          <input type="number" step="any" data-action="set-cutting-plane-coord" data-region="${escHtml(activeTab)}" data-index="${idx}" data-which="point" data-axis="1" value="${cp.point[1]}" style="width:55px;font-size:12px;">
                          <input type="number" step="any" data-action="set-cutting-plane-coord" data-region="${escHtml(activeTab)}" data-index="${idx}" data-which="point" data-axis="2" value="${cp.point[2]}" style="width:55px;font-size:12px;">
                        </label>
                        <label style="display:flex;align-items:center;gap:4px;">Normal:
                          <input type="number" step="any" data-action="set-cutting-plane-coord" data-region="${escHtml(activeTab)}" data-index="${idx}" data-which="normal" data-axis="0" value="${cp.normal[0]}" style="width:55px;font-size:12px;">
                          <input type="number" step="any" data-action="set-cutting-plane-coord" data-region="${escHtml(activeTab)}" data-index="${idx}" data-which="normal" data-axis="1" value="${cp.normal[1]}" style="width:55px;font-size:12px;">
                          <input type="number" step="any" data-action="set-cutting-plane-coord" data-region="${escHtml(activeTab)}" data-index="${idx}" data-which="normal" data-axis="2" value="${cp.normal[2]}" style="width:55px;font-size:12px;">
                        </label>
                      </div>`
                    : `<select data-action="set-monitor-scope-name" data-region="${escHtml(activeTab)}" data-index="${idx}" data-scope="${escHtml(scope)}">${scopeOptions.map(opt => `<option value="${escHtml(opt)}" ${scopeName === opt ? 'selected' : ''}>${escHtml(opt)}</option>`).join('')}</select>`
                }</td>
                <td><button type="button" class="del-btn" data-action="delete-monitor" data-region="${escHtml(activeTab)}" data-index="${idx}">×</button></td>
              </tr>`;
            }).join('') : '<tr><td colspan="5" class="no-data">No monitoring objects defined.</td></tr>') : '<tr><td colspan="5" class="no-data">No regions loaded.</td></tr>'}
          </tbody>
        </table>
      </div>
      ${activeTab ? `<div style="margin-top:10px;"><button type="button" class="btn btn-primary btn-sm" data-action="add-monitor" data-region="${escHtml(activeTab)}">+ Add</button></div>` : ''}
    </div>
  `;
}

function renderStep11() {
  const STEP11_TABS = ['Schemes', 'Matrix Solvers', 'Iterative', 'Convergence', 'Relaxation'];
  const activeTab = getFirstTab('step11', STEP11_TABS);
  const ns = state.numerical_schemes;
  const conv = ns.convection || {};
  const is = state.iterative_solver;
  const isSteady = state.simulation.type === 'steady-state';
  const incompressible = isIncompressibleSolver();
  const isTurb = !!state.turbulence.active;
  const hasSolids = (state.regions.solids || []).length > 0;
  const convOpts = (path, val) =>
    ['first-order-upwind', 'second-order-upwind']
      .map(o => `<option value="${o}" ${val === o ? 'selected' : ''}>${o}</option>`).join('');

  const tabContent = {
    Schemes: `
      <div class="card">
        <div class="card-title">📐 Numerical Schemes</div>
        <div style="max-width:380px;">
          <div class="field-grid" style="grid-template-columns:1fr;">
            ${state.simulation.type === 'transient' ? `
            <div class="field-group"><label>time</label><select data-action="set-state" data-path="numerical_schemes.time">
              <option value="Euler"        ${ns.time === 'Euler'        ? 'selected' : ''}>Euler</option>
              <option value="backward"     ${ns.time === 'backward'     ? 'selected' : ''}>backward</option>
              <option value="CrankNicolson"${ns.time === 'CrankNicolson'? 'selected' : ''}>CrankNicolson</option>
            </select></div>` : ''}
            <div class="field-group"><label>gradients</label><select data-action="set-state" data-path="numerical_schemes.gradients">
              <option value="green-gauss"   ${ns.gradients === 'green-gauss'  ? 'selected' : ''}>green-gauss</option>
              <option value="least-squares" ${ns.gradients === 'least-squares'? 'selected' : ''}>least-squares</option>
            </select></div>
            <div class="field-group" style="margin-top:10px;">
              <span style="font-size:0.78rem;font-weight:700;color:#4b5563;text-transform:uppercase;letter-spacing:0.04em;">── Convection Schemes ──</span>
            </div>
            <div class="field-group"><label>momentum</label><select data-action="set-state" data-path="numerical_schemes.convection.momentum">${convOpts('numerical_schemes.convection.momentum', conv.momentum)}</select></div>
            ${!incompressible ? `<div class="field-group"><label>energy</label><select data-action="set-state" data-path="numerical_schemes.convection.energy">${convOpts('numerical_schemes.convection.energy', conv.energy)}</select></div>` : ''}
            ${isTurb ? `<div class="field-group"><label>turbulence</label><select data-action="set-state" data-path="numerical_schemes.convection.turbulence">${convOpts('numerical_schemes.convection.turbulence', conv.turbulence)}</select></div>` : ''}
          </div>
        </div>
      </div>`,

    'Matrix Solvers': `
      <div class="card">
        <div class="card-title">🔢 Matrix Solvers</div>
        <div style="display:flex;flex-direction:column;gap:20px;max-width:440px;">
          <div>
            <div style="font-size:0.72rem;font-weight:800;color:#6b7280;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;border-bottom:1px solid #e5e7eb;padding-bottom:4px;">── Fluid ──</div>
            <div style="display:flex;flex-direction:column;gap:12px;">
              ${renderMatrixSolverBlock('Pressure', 'matrix_solvers.fluid.pressure', state.matrix_solvers.fluid.pressure)}
              ${renderMatrixSolverBlock('Others (Momentum / Energy / Turbulence etc.)', 'matrix_solvers.fluid.others', state.matrix_solvers.fluid.others)}
            </div>
          </div>
          ${hasSolids ? `<div>
            <div style="font-size:0.72rem;font-weight:800;color:#6b7280;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;border-bottom:1px solid #e5e7eb;padding-bottom:4px;">── Solid ──</div>
            ${renderMatrixSolverBlock('Energy', 'matrix_solvers.solid.energy', state.matrix_solvers.solid.energy)}
          </div>` : ''}
        </div>
      </div>`,

    Iterative: (() => {
      const irow = (label, control) =>
        `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
           <span style="font-size:0.78rem;font-weight:700;color:#4b5563;min-width:220px;flex-shrink:0;">${label}</span>
           ${control}
         </div>`;
      const sel = (path, val, opts) =>
        `<select data-action="set-state" data-path="${escHtml(path)}" style="flex:1;">${
          opts.map(o => `<option value="${o}" ${val === o ? 'selected' : ''}>${o}</option>`).join('')
        }</select>`;
      const num = (path, val, step) =>
        `<input type="number" step="${step}" value="${val}" data-action="set-state" data-path="${escHtml(path)}" data-kind="${step === '1' ? 'int' : 'number'}" style="flex:1;">`;
      const chk = (path, checked) =>
        `<label style="display:flex;align-items:center;gap:6px;font-size:0.85rem;">
           <input type="checkbox" data-action="set-state" data-path="${escHtml(path)}" data-kind="bool" ${checked ? 'checked' : ''}>
           <span>true</span>
         </label>`;
      return `
      <div class="card">
        <div class="card-title">🔄 Iterative Solver</div>
        <div style="max-width:440px;">
          <div style="font-size:0.72rem;font-weight:800;color:#6b7280;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;border-bottom:1px solid #e5e7eb;padding-bottom:4px;">── Fluid ──</div>
          ${irow('Fluid scheme',                    sel('iterative_solver.fluid.scheme', is.fluid.scheme, ['SIMPLE','SIMPLEC']))}
          ${irow('Pressure correctors',             num('iterative_solver.fluid.pressure_correctors', is.fluid.pressure_correctors, '1'))}
          ${irow('Non-orthogonal correctors',       num('iterative_solver.fluid.non_orthogonal_correctors', is.fluid.non_orthogonal_correctors, '1'))}
          ${isSteady ? '' : `
          <div style="font-size:0.72rem;font-weight:800;color:#6b7280;text-transform:uppercase;letter-spacing:0.08em;margin:12px 0 8px;border-bottom:1px solid #e5e7eb;padding-bottom:4px;">── Transient only ──</div>
          ${irow(
            'Maximum outer iterations <span title="Maximum number of PIMPLE iterations if convergence is not reached in a time-step" style="cursor:help;color:#9ca3af;font-weight:400;">(?)</span>',
            num('iterative_solver.max_outer_iterations', is.max_outer_iterations, '1')
          )}
          ${irow('Momentum predictor',             chk('iterative_solver.fluid.momentum_predictor', is.fluid.momentum_predictor))}
          ${isTurb ? irow('Solve turbulence once per step', chk('iterative_solver.fluid.solve_turb_once_per_timestep', is.fluid.solve_turb_once_per_timestep)) : ''}

          ${hasSolids ? `
          <div style="font-size:0.72rem;font-weight:800;color:#6b7280;text-transform:uppercase;letter-spacing:0.08em;margin:12px 0 10px;border-bottom:1px solid #e5e7eb;padding-bottom:4px;">── Solid ──</div>

        </div>
      </div>`;
    })(),

    Convergence: (() => {

      const crow = (label, path, val) =>
        `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
           <span style="font-size:0.78rem;font-weight:700;color:#4b5563;min-width:160px;flex-shrink:0;">${label}</span>
           <input type="text" class="sci-input" value="${formatSciNum(val)}" data-action="set-sci" data-path="${escHtml(path)}" style="flex:1;">
         </div>`;
      const divider = txt => `<div style="font-size:0.72rem;font-weight:800;color:#6b7280;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;border-bottom:1px solid #e5e7eb;padding-bottom:4px;">${txt}</div>`;
      return `
      <div class="card">
        <div class="card-title">🎯 Convergence Criteria</div>
        <div style="max-width:440px;">
          ${divider('── Fluid ──')}
          ${crow('Pressure',   'convergence_criteria.fluid.residuals.pressure',   cc.fluid.residuals.pressure)}
          ${crow('Velocity',   'convergence_criteria.fluid.residuals.velocity',   cc.fluid.residuals.velocity)}
          ${!incompressible ? crow('Energy',     'convergence_criteria.fluid.residuals.energy',     cc.fluid.residuals.energy) : ''}
          ${isTurb ? crow('Turbulence', 'convergence_criteria.fluid.residuals.turbulence', cc.fluid.residuals.turbulence) : ''}
          ${hasSolids ? `
          ${divider('── Solid ──')}
          ${crow('Energy',     'convergence_criteria.solid.residuals.energy',     cc.solid.residuals.energy)}
          ` : ''}
        </div>
      </div>`;
    })(),

    Relaxation: (() => {
      const rf = state.relaxation_factors;
      const rrow = (label, path, val) =>
        `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
           <span style="font-size:0.78rem;font-weight:700;color:#4b5563;min-width:160px;flex-shrink:0;">${label}</span>
           <input type="number" step="any" value="${val}" data-action="set-state" data-path="${escHtml(path)}" data-kind="number" style="flex:1;">
         </div>`;
      const divider = txt => `<div style="font-size:0.72rem;font-weight:800;color:#6b7280;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;border-bottom:1px solid #e5e7eb;padding-bottom:4px;">${txt}</div>`;
      return `
      <div class="card">
        <div class="card-title">⚖️ Relaxation Factors</div>
        <div style="max-width:440px;">
          ${divider('── Fluid ──')}
          ${!incompressible ? rrow('Density',    'relaxation_factors.fluid.density',    rf.fluid.density) : ''}
          ${rrow('Pressure',   'relaxation_factors.fluid.pressure',   rf.fluid.pressure)}
          ${rrow('Velocity',   'relaxation_factors.fluid.velocity',   rf.fluid.velocity)}
          ${!incompressible ? rrow('Energy',     'relaxation_factors.fluid.energy',     rf.fluid.energy) : ''}
          ${isTurb ? rrow('Turbulence', 'relaxation_factors.fluid.turbulence', rf.fluid.turbulence) : ''}
          ${hasSolids ? `
          ${divider('── Solid ──')}
          ${rrow('Energy',     'relaxation_factors.solid.energy',     rf.solid.energy)}
          ` : ''}
        </div>
      </div>`;
    })(),
  };

  return `
    ${renderMessageHtml()}
    ${renderTabs('step11', STEP11_TABS, activeTab)}
    ${tabContent[activeTab] || ''}
  `;
}

function renderMatrixSolverBlock(title, prefix, obj) {
  const solverOpts    = ['GAMG', 'PCG', 'PBiCGStab'];
  const preconOpts    = ['GaussSeidel', 'DILU', 'DIC', 'diagonal'];
  const mkSel = (field, opts) => `<select data-action="set-state" data-path="${escHtml(prefix)}.${field}" style="flex:1;">${
    opts.map(o => `<option value="${o}" ${obj[field] === o ? 'selected' : ''}>${o}</option>`).join('')
  }</select>`;
  const mkNum = (field, step) => `<input type="number" step="${step}" value="${obj[field]}" data-action="set-state" data-path="${escHtml(prefix)}.${field}" data-kind="${step === '1' ? 'int' : 'number'}" style="flex:1;">`;
  const row = (label, control) => `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;"><label style="font-size:0.78rem;font-weight:700;color:#4b5563;min-width:140px;flex-shrink:0;">${label}</label>${control}</div>`;
  return `
    <div style="border:1px solid #d1d5db;border-radius:6px;padding:12px;max-width:440px;background:#f9fafb;">
      <div style="font-size:0.78rem;font-weight:700;color:#374151;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.05em;">${escHtml(title)}</div>
      ${row('Solver',             mkSel('solver', solverOpts))}
      ${row('Preconditioner',     mkSel('preconditioner', preconOpts))}
      ${row('Tolerance',          `<input type="text" class="sci-input" value="${formatSciNum(obj.tolerance)}" data-action="set-sci" data-path="${escHtml(prefix)}.tolerance" style="flex:1;">`)}
      ${row('Relative tolerance', `<input type="text" class="sci-input" value="${formatSciNum(obj.relative_tolerance)}" data-action="set-sci" data-path="${escHtml(prefix)}.relative_tolerance" style="flex:1;">`)}
      ${row('Min iterations',     mkNum('min_iter', '1'))}
      ${row('Max iterations',     mkNum('max_iter', '1'))}
    </div>
  `;
}

function renderStep12() {

    `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
       <span style="font-size:0.78rem;font-weight:700;color:#4b5563;min-width:160px;flex-shrink:0;">${label}</span>
       ${control}
     </div>`;
  const radioGroup = (path, val, options) =>
    options.map(([label, v]) =>
      `<label style="margin-right:10px;font-size:0.78rem;">
         <input type="radio" name="${path}" value="${v}" data-action="set-state" data-path="${path}" data-kind="${typeof v === 'boolean' ? 'bool-radio' : 'string'}" data-rerender="1" ${val === v ? 'checked' : ''}> ${label}
       </label>`

    ? `<div style="margin-top:14px;padding-top:10px;border-top:1px solid #e5e7eb;">
        <div style="font-size:0.72rem;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px;">Time stepping</div>
        ${row('Adjust timestep', radioGroup('run_settings.adjust_timestep', rs.adjust_timestep, [['yes', true], ['no', false]]))}
        ${rs.adjust_timestep ? `
        ${row('Initial deltaT',  `<input type="number" step="any" min="0" value="${rs.delta_t}"     data-action="set-state" data-path="run_settings.delta_t"     data-kind="number" style="flex:1;">`)}
        ${row('Max deltaT',      `<input type="number" step="any" min="0" value="${rs.max_delta_t}" data-action="set-state" data-path="run_settings.max_delta_t" data-kind="number" style="flex:1;">`)}
        ${row('Max Courant No.', `<input type="number" step="any" min="0" value="${rs.max_co}"      data-action="set-state" data-path="run_settings.max_co"      data-kind="number" style="flex:1;">`)}
        ${row('Max Di',          `<input type="number" step="any" min="0" value="${rs.max_di}"      data-action="set-state" data-path="run_settings.max_di"      data-kind="number" style="flex:1;">`)}
        <div class="info-box" style="margin-top:4px;">writeControl → <strong>adjustableRunTime</strong></div>
        ` : `
        ${row('Time-step size',  `<input type="number" step="any" min="0" value="${rs.delta_t}"     data-action="set-state" data-path="run_settings.delta_t"     data-kind="number" style="flex:1;">`)}
        <div class="info-box" style="margin-top:4px;">writeControl → <strong>runTime</strong></div>
        `}
      </div>`
    : `<div style="margin-top:14px;padding-top:10px;border-top:1px solid #e5e7eb;">
        <div style="font-size:0.72rem;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px;">Time stepping</div>
        <div style="opacity:0.45;pointer-events:none;">
          ${row('deltaT',           '<span style="font-size:0.78rem;">1 &nbsp;(fixed — steady-state)</span>')}
          ${row('Adjust timestep',  '<span style="font-size:0.78rem;">no &nbsp;(fixed)</span>')}
          ${row('writeControl',     '<span style="font-size:0.78rem;">runTime &nbsp;(fixed)</span>')}
        </div>
      </div>`;

  return `
    ${renderMessageHtml()}
    <div class="card">
      <div class="card-title">🏁 Run Settings</div>
      <div style="max-width:440px;">
        ${row('End time',         `<input type="number" step="any" value="${rs.end_time}" data-action="set-state" data-path="run_settings.end_time" data-kind="number" style="flex:1;">`)}
        ${row('Write interval',   `<input type="number" step="any" value="${rs.write_interval}" data-action="set-state" data-path="run_settings.write_interval" data-kind="number" style="flex:1;">`)}
        ${row('Number of cores',  `<input type="number" step="1" value="${rs.num_cores}" data-action="set-state" data-path="run_settings.num_cores" data-kind="int" style="flex:1;">`)}

        <div style="margin-top:14px;padding-top:10px;border-top:1px solid #e5e7eb;">
          <div style="font-size:0.72rem;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px;">Output</div>
          ${row('Write format',    radioGroup('run_settings.write_format', rs.write_format, [['ascii', 'ascii'], ['binary', 'binary']]))}
          ${row('Write precision', `<input type="number" step="1" min="1" value="${rs.write_precision}" data-action="set-state" data-path="run_settings.write_precision" data-kind="int" style="width:80px;">`)}
          ${row('Time precision',  `<input type="number" step="1" min="1" value="${rs.time_precision}"  data-action="set-state" data-path="run_settings.time_precision"  data-kind="int" style="width:80px;">`)}
        </div>

        ${timeSteppingSection}
      </div>
    </div>
  `;
}
