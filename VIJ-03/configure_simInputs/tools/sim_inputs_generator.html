<body>
<div class="app-shell">
  <header class="topbar">
    <div class="topbar-title-wrap">
      <div class="topbar-icon">🧪</div>
      <div>
        <h1>sim_inputs.json Generator</h1>
        <div class="topbar-subtitle">Wizard for OpenFOAM electronics thermal management simulation inputs</div>
      </div>
    </div>
    <div class="topbar-actions">
      <button class="btn btn-secondary" id="save-draft-btn" title="Save all current progress as a draft file">💾 Save Draft</button>
      <button class="btn btn-secondary" id="load-json-btn" title="Load project folder (sim_inputs.json + custom_materials_library.json + inputData/ CSVs)">📂 Load Project</button>
      <input type="file" id="load-json-input" accept=".json,.csv,application/json,text/csv" multiple class="hidden">
    </div>
  </header>

  <div class="wizard-layout">
    <aside class="sidebar">
      <div class="sidebar-header">Configuration Steps</div>
      <ul class="step-list" id="sidebar-steps"></ul>
    </aside>

    <main class="main-panel" id="main-panel">
      <div class="main-header">
        <div>
          <div class="main-title" id="main-title"></div>
          <div class="main-subtitle" id="main-subtitle"></div>
        </div>
        <div class="step-counter" id="step-counter"></div>
      </div>
      <div class="step-content" id="step-content"></div>
      <div class="nav-bar">
        <button class="btn btn-secondary" id="prev-step-btn">← Prev</button>
        <div class="spacer"></div>
        <button class="btn btn-primary" id="next-step-btn">Next →</button>
      </div>
    </main>
  </div>
</div>

<script>
'use strict';

const SOLVERS = {
  multi: {
    steady:    ['chtMultiRegionSimpleFoam'],
    transient: ['chtMultiRegionFoam']
  },
  single_fluid: {
    steady:    ['buoyantSimpleFoam', 'simpleFoam'],
    transient: ['buoyantPimpleFoam', 'pimpleFoam']
  },
  single_solid: {
    steady:    ['solidFoam'],
    transient: ['solidFoam']
  }
};

// Returns true when the currently selected solver is simpleFoam or pimpleFoam
function isIncompressibleSolver() {
  return (state.simulation.solver_name === 'simpleFoam' ||
          state.simulation.solver_name === 'pimpleFoam');
}

// ── CSV Panel global state ──────────────────────────────────────────────────
const csvPanels = {};        // ctxKey → { rows, dirty, loaded, numComponents }
let activeCsvPanels = new Set(); // populated each render, checked by goNext()
let csvOutputDirHandle = null;   // FileSystemDirectoryHandle for inputData/ — set by user

const STEP_TITLES = [
  'General',
  'Mesh Import',
  'CHT Interfaces',
  'Material Properties',
  'Physical Models',
  'Boundary Conditions',
  'FaceZone Conditions',
  'Source Terms',
  'Initial Conditions',
  'Monitoring',
  'Numerics',
  'Run Settings',
  'Export Preview'
];

const DEFAULT_MATERIALS_LIBRARY = {
  '_info': { 'description': 'Built-in materials library' },

function deepClone(obj) {
  return JSON.parse(JSON.stringify(obj));
}

// Deep-merge src into a clone of base. Keys present in src override base;
// keys absent in src keep their base (default) values.
function deepMerge(base, src) {
  const out = deepClone(base);
  if (src && typeof src === 'object' && !Array.isArray(src)) {
    Object.keys(src).forEach(k => {
      if (src[k] && typeof src[k] === 'object' && !Array.isArray(src[k]) &&
          out[k]  && typeof out[k]  === 'object' && !Array.isArray(out[k])) {
        out[k] = deepMerge(out[k], src[k]);
      } else {
        out[k] = deepClone(src[k]);
      }
    });
  }
  return out;
}

function escHtml(value) {
  return String(value == null ? '' : value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function parseNum(v, fallback = 0) {
  const n = parseFloat(v);
  return Number.isFinite(n) ? n : fallback;
}

function parseIntSafe(v, fallback = 0) {
  const n = parseInt(v, 10);
  return Number.isFinite(n) ? n : fallback;
}

function toArrayText(arr) {
  return '[' + (Array.isArray(arr) ? arr.join(', ') : '') + ']';
}

function parseArrayText(text) {
  const trimmed = String(text || '').trim();
  if (!trimmed) return [];
  const cleaned = trimmed.replace(/^\[/, '').replace(/\]$/, '');
  if (!cleaned.trim()) return [];
  return cleaned.split(',').map(s => parseIntSafe(s.trim(), 0));
}

function setByPath(obj, path, value) {
  const parts = path.split('.');
  let cur = obj;
  for (let i = 0; i < parts.length - 1; i++) {
    const raw = parts[i];
    const key = /^\d+$/.test(raw) ? Number(raw) : raw;
    const nextRaw = parts[i + 1];
    if (cur[key] == null) cur[key] = /^\d+$/.test(nextRaw) ? [] : {};
    cur = cur[key];
  }
  const lastRaw = parts[parts.length - 1];
  const lastKey = /^\d+$/.test(lastRaw) ? Number(lastRaw) : lastRaw;
  cur[lastKey] = value;
}

function getByPath(obj, path, fallback) {
  const parts = path.split('.');
  let cur = obj;
  for (const raw of parts) {
    const key = /^\d+$/.test(raw) ? Number(raw) : raw;
    if (cur == null || !(key in cur)) return fallback;
    cur = cur[key];
  }
  return cur;
}

function deleteByPath(obj, path) {
  const parts = path.split('.');
  let cur = obj;
  for (let i = 0; i < parts.length - 1; i++) {
    const key = /^\d+$/.test(parts[i]) ? Number(parts[i]) : parts[i];
    if (cur == null || !(key in cur)) return;
    cur = cur[key];
  }
  const last = /^\d+$/.test(parts[parts.length - 1]) ? Number(parts[parts.length - 1]) : parts[parts.length - 1];
  if (Array.isArray(cur) && typeof last === 'number') {
    cur.splice(last, 1);
  } else if (cur && typeof cur === 'object') {
    delete cur[last];
  }
}

function coerceValue(target) {
  const kind = target.dataset.kind || 'string';
  if (kind === 'number') return parseNum(target.value, 0);
  if (kind === 'int') return parseIntSafe(target.value, 0);
  if (kind === 'bool') return !!target.checked;
  if (kind === 'bool-radio') return target.value === 'true';
  if (kind === 'array-int-text') return parseArrayText(target.value);
  return target.value;
}

const SCI_NUM_RE = /^\s*-?\d*\.?\d+([eE][+-]?\d+)?\s*$/;
function isValidSciNum(str) { return SCI_NUM_RE.test(str); }
function formatSciNum(val) {
  const n = Number(val);
  if (!isFinite(n)) return String(val);
  if (n === 0) return '0';
  const abs = Math.abs(n);
  if (abs > 0 && abs < 0.001) return n.toExponential().replace(/e\+?(-?)0*(\d+)$/, 'e$1$2');
  return String(n);
}

function downloadText(filename, text) {
  const blob = new Blob([text], { type: 'application/json;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

async function downloadScript(filename, content) {
  if (window.showSaveFilePicker) {
    try {
      const handle = await window.showSaveFilePicker({ suggestedName: filename });
      const writable = await handle.createWritable();
      await writable.write(content);
      await writable.close();
      return;
    } catch (err) {
      if (err.name === 'AbortError') return;
    }
  }
  const blob = new Blob([content], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function buildAllrun() {
  const isCHT      = state.simulation.case_type === 'cht';
  const isParallel  = (state.run_settings.num_cores || 1) > 1;
  const run         = isParallel ? 'runParallel' : 'runApplication';
  const allRegions  = isCHT ? ' -allRegions' : '';

  // Collect fluid regions that have at least one active faceZone (baffle) condition
  const baffleRegions = (state.regions.fluids || []).filter(r => {
    const zones = state.faceZone_conditions[r];
    return zones && Object.keys(zones).length > 0;
  });
  const baffleBlock = baffleRegions
    .map(r => `runApplication createBaffles -region ${r} -overwrite`)
    .join('\n');

  const parallelBlock = isParallel ? `
runApplication decomposePar${allRegions}

${run} renumberMesh${allRegions} -overwrite

${run} \$(getApplication)

runApplication reconstructParMesh${isCHT ? allRegions : ' -constant'}

runApplication reconstructPar${allRegions} -latestTime
` : `
runApplication renumberMesh${allRegions} -overwrite

runApplication \$(getApplication)
`;

  return `#!/bin/sh
cd "\${0%/*}" || exit                                # Run from this directory
. \${WM_PROJECT_DIR:?}/bin/tools/RunFunctions        # Tutorial run functions
#------------------------------------------------------------------------------
${baffleBlock ? '\n' + baffleBlock + '\n' : ''}${parallelBlock}
#------------------------------------------------------------------------------
`;
}

async function downloadAllrun() {
  await downloadScript('Allrun', buildAllrun());
}

rm -rf processor* postProcessing log.*

function parseCsvText(text) {
  const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n').filter(l => l.trim() !== '');
  return lines.map(line => {
    const cols = []; let inQ = false, cur = '';
    for (let i = 0; i < line.length; i++) {
      if (line[i] === '"') { inQ = !inQ; }
      else if (line[i] === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else cur += line[i];
    }
    cols.push(cur.trim());
    return cols;
  });
}

function serializeCsvRows(rows) {
  return rows.map(row => row.map(cell => {
    const s = String(cell);
    return (s.includes(',') || s.includes('"') || s.includes('\n')) ? `"${s.replace(/"/g, '""')}"` : s;
  }).join(',')).join('\n');
}

function getCsvPanel(ctxKey, numComponents) {
  if (!csvPanels[ctxKey]) {
    const n = (numComponents || 1) + 1;
    csvPanels[ctxKey] = { rows: [Array(n).fill(''), Array(n).fill('')], dirty: false, loaded: false, numComponents: numComponents || 1 };
  }
  return csvPanels[ctxKey];
}

function hasPendingCsvExports() {
  for (const ctxKey of activeCsvPanels) {
    const panel = csvPanels[ctxKey];
    if (panel && panel.dirty) return true;
  }
  return false;
}

function updateCsvStatusBadge(ctxKey) {
  const panel = csvPanels[ctxKey];
  if (!panel) return;
  const el = document.querySelector(`.csv-panel[data-ctx="${CSS.escape(ctxKey)}"] .csv-status-badge`);
  if (!el) return;
  if (panel.dirty) {
    el.className = 'csv-status-badge csv-status-warn';
    el.textContent = '⚠ Unsaved — export required';
  } else {
    el.className = 'csv-status-badge csv-status-ok';
    el.textContent = panel.loaded ? '✓ Loaded from disk' : '✓ Ready';
  }
}

// Update a field in the underlying state (csv_file, ref_column, etc.) for any csv panel context.
// ctxKey format: "bc|region|patch|basePath" or "fz|region|zone|fan_curve"
function setCsvConfigField(ctxKey, field, value) {
  const [type, ...rest] = ctxKey.split('|');
  if (type === 'bc') {
    const [region, patch, basePath] = rest;
    const bc = getBC(region, patch);
    setByPath(bc, basePath + '.' + field, value);
  } else if (type === 'fz') {
    const [region, zone] = rest;
    setByPath(faceZoneConfig(region, zone), 'fan_curve.' + field, value);
  }
}

function renderCsvPanel(ctxKey, csvConfig, makeAttrs, options) {
  const { numComponents = 1, label = 'CSV Data', refLabel = null, compLabels: customCompLabels = null } = options || {};
  activeCsvPanels.add(ctxKey);
  const panel = getCsvPanel(ctxKey, numComponents);
  const rows = panel.rows;
  const numCols = rows.length > 0 ? rows[0].length : (numComponents + 1);

  const filename = csvConfig?.csv_file || 'data.csv';
  const refCol = csvConfig?.ref_column ?? 0;
  let compCols = Array.isArray(csvConfig?.component_columns) ? [...csvConfig.component_columns] : Array.from({ length: numComponents }, (_, i) => i + 1);
  // Auto-correct length mismatch
  while (compCols.length < numComponents) compCols.push(compCols[compCols.length - 1] + 1);
  compCols = compCols.slice(0, numComponents);
  const skipRows = csvConfig?.skip_rows ?? 1;

  const compLabels = customCompLabels || (numComponents === 1 ? ['Value'] : ['Vx', 'Vy', 'Vz']);

  const previewRows = rows.slice(0, 20);

    ? `<span class="csv-status-badge csv-status-warn">⚠ Unsaved — export required</span>`

  return `
  <div class="csv-panel" data-ctx="${escHtml(ctxKey)}">
    <div class="csv-panel-toolbar">

      <table class="csv-editor-table">
        <thead><tr>${colHeaders}<th></th></tr></thead>
        <tbody>
          ${previewRows.map((row, ri) => `<tr>${
            Array.from({ length: numCols }, (_, ci) =>
              `<td><input type="text" class="csv-cell" value="${escHtml(row[ci] ?? '')}" data-action="csv-cell-edit" data-ctx="${escHtml(ctxKey)}" data-row="${ri}" data-col="${ci}"></td>`
            ).join('')
          }<td><button type="button" class="del-btn" data-action="csv-del-row" data-ctx="${escHtml(ctxKey)}" data-row="${ri}" title="Delete row">×</button></td></tr>`).join('')}
          ${rows.length > 20 ? `<tr><td colspan="${numCols + 1}" class="no-data">… ${rows.length - 20} more rows (not shown — all included in export)</td></tr>` : ''}
          ${rows.length === 0 ? `<tr><td colspan="${numCols + 1}" class="no-data">No rows — click + Add Row or load a CSV</td></tr>` : ''}
        </tbody>
      </table>
    </div>
    <div class="csv-row-actions">
      <button type="button" class="btn btn-secondary btn-xs" data-action="csv-add-row" data-ctx="${escHtml(ctxKey)}" data-numcols="${numCols}">+ Add Row</button>
      <button type="button" class="btn btn-secondary btn-xs" data-action="csv-add-col" data-ctx="${escHtml(ctxKey)}">+ Add Col</button>
      ${numCols > numComponents + 1 ? `<button type="button" class="btn btn-secondary btn-xs" data-action="csv-del-col" data-ctx="${escHtml(ctxKey)}">− Del Last Col</button>` : ''}
    </div>
    <div class="csv-col-assign">
      <span class="csv-assign-label">${escHtml(refColLabel)} column:</span>
      <select ${makeAttrs('ref_column', 'int')} data-rerender="1">${colOptions(refCol)}</select>
      ${Array.from({ length: numComponents }, (_, i) => `

      <span class="csv-assign-label">Filename:</span>

    </div>
  </div>`;

  if (ct === 'single-fluid') return SOLVERS.single_fluid[simKey];
  if (ct === 'single-solid') return SOLVERS.single_solid[simKey];
  return SOLVERS.multi[simKey];

function ensureSolverCompatibility() {
  const options = getAvailableSolvers();
  if (!options.includes(state.simulation.solver_name)) {
    state.simulation.solver_name = options[0];
  }
}

function defaultFluidIC() {
  if (isIncompressibleSolver()) {
    return { U: [0.0, 0.0, 0.0], p: 0.0, k: 1.0, omega: 1000 };
  }
  return { U: [0.0, 0.0, 0.0], p: 0.0, T: 'REF-TEMP', k: 1.0, omega: 1000 };
}

function defaultSolidIC() {
  return { T: state.reference_conditions.temperature };
}

function defaultFaceZoneConfig() {
  return { type: 'fan', patch_name: '', fan_curve: { csv_file: '', ref_column: 0, component_columns: [1], skip_rows: 0 } };
}

function defaultTurbulenceDirichlet() {
  return { mode: 'dirichlet', k: 1.0, omega: 1000 };
}

function defaultBackflow() {
  return {
    thermal: { mode: 'temperature', value: state.reference_conditions.temperature },
    turbulence: { mode: 'intensity-and-length-scale', intensity: 0.05, length_scale: 0.01 }
  };
}

function normalizeSolidMaterial(regionName) {
  const val = state.material_properties[regionName];
  const firstSolid = getMaterialEntries('solid')[0]?.[0] || 'copper';
  if (!val || typeof val === 'string') {
    state.material_properties[regionName] = { type: 'uniform', material: firstSolid, kappa_type: 'isotropic' };
    return;
  }
  if (!val.type && !val.properties) {
    state.material_properties[regionName] = {
      type: 'uniform',
      material: val.material || firstSolid,
      kappa_type: val.kappa_type || 'isotropic',
      kappa: val.kappa_type === 'anisotropic' ? (Array.isArray(val.kappa) ? val.kappa : [1, 1, 1]) : (typeof val.kappa === 'number' ? val.kappa : 1.0),
      coordinate_system: val.coordinate_system || { origin: [0, 0, 0], e1: [1, 0, 0], e2: [0, 1, 0] }
    };
    return;
  }
  if (val.type === 'cell_zone_specific') {
    if (!val.kappa_type) val.kappa_type = 'isotropic';
    if (!val.properties || typeof val.properties !== 'object') {
      val.properties = { default: { material: '' } };
    }
    // Explode grouped keys and strip legacy _assigned flags; skips old _assigned:false entries
    val.properties = explodeZoneMaterials(val.properties);
    // Enforce kappa consistency for all present entries (do not auto-create new zone entries)
    Object.values(val.properties).forEach(entry => {
      if (val.kappa_type === 'anisotropic') {
        if (!Array.isArray(entry.kappa)) entry.kappa = [1, 1, 1];
      } else {
        delete entry.kappa;
      }
    });
    if (val.kappa_type === 'anisotropic' && !val.coordinate_system) {
      val.coordinate_system = { origin: [0, 0, 0], e1: [1, 0, 0], e2: [0, 1, 0] };
    }
  }
}

function ensureRegionData(regionName, type) {
  state.region_parts[regionName] = state.region_parts[regionName] || { boundaries: [], cellZones: [], faceZones: [] };
  state.boundary_conditions[regionName] = state.boundary_conditions[regionName] || {};
  state.faceZone_conditions[regionName] = state.faceZone_conditions[regionName] || {};
  state.function_objects[regionName] = Array.isArray(state.function_objects[regionName]) ? state.function_objects[regionName] : [];
  state.fv_options[regionName] = Array.isArray(state.fv_options[regionName]) ? state.fv_options[regionName] : [];
  if (type === 'fluid') {
    state.initial_conditions[regionName] = state.initial_conditions[regionName] || defaultFluidIC();
    if (typeof state.material_properties[regionName] !== 'string') {
      state.material_properties[regionName] = getMaterialEntries('fluid')[0]?.[0] || 'air-temperature-dependent';
    }
    // Pre-create __default__ group with no-slip-wall / heat-flux=0
    if (!state.boundary_conditions[regionName]['__default__']) {
      state.boundary_conditions[regionName]['__default__'] = { type: 'no-slip-wall', thermal: { mode: 'heat-flux', value: 0 }, emissivity: 0.9 };
    }
  } else if (type === 'solid') {
    state.initial_conditions[regionName] = state.initial_conditions[regionName] || defaultSolidIC();
    normalizeSolidMaterial(regionName);
    // Pre-create __default__ group with solid-wall / adiabatic
    if (!state.boundary_conditions[regionName]['__default__']) {
      state.boundary_conditions[regionName]['__default__'] = deepClone(BC_DEFAULTS['solid-wall']);
    }
  }
}

function cleanupRegionReferences(deletedRegion) {
  delete state.region_parts[deletedRegion];
  delete state.material_properties[deletedRegion];
  delete state.boundary_conditions[deletedRegion];
  delete state.faceZone_conditions[deletedRegion];
  delete state.function_objects[deletedRegion];
  delete state.fv_options[deletedRegion];
  delete state.initial_conditions[deletedRegion];

  const interfaces = state.region_parts.cht_interfaces || {};
  const bcInterfaces = state.boundary_conditions.cht_interfaces || {};
  Object.keys(interfaces).forEach(name => {
    const pair = interfaces[name]?.pair || [];
    if (pair.some(item => item.region === deletedRegion)) {
      delete interfaces[name];
      delete bcInterfaces[name];
    }
  });
}

function parseMeshLog(text) {
  const boundaries = [];
  const patchFaces = {};
  const patchMatch = text.match(/Checking patch topology[\s\S]*?Patch\s+Faces\s+Points\s+Surface topology\n([\s\S]*?)(?:Detected|Checking)/);
  if (patchMatch) {
    for (const line of patchMatch[1].split('\n')) {
      const t = line.trim();
      if (!t || t.startsWith('-')) continue;
      const tokens = t.split(/\s+/);
      if (tokens.length < 4) continue;
      const name = tokens[0];
      if (name.includes('"') || name.includes('.*')) continue;
      boundaries.push(name);
      const faceCount = parseInt(tokens[1], 10);
      if (!isNaN(faceCount)) patchFaces[name] = faceCount;
    }
  }

  const faceZones = [];
  const fzMatch = text.match(/Checking faceZone topology[\s\S]*?FaceZone\s+Faces\s+Points\s+Surface topology\n([\s\S]*?)Checking basic cellZone/);
  if (fzMatch) {
    for (const line of fzMatch[1].split('\n')) {
      const t = line.trim();
      if (!t || t.startsWith('-') || t.startsWith('<<')) continue;
      const tokens = t.split(/\s+/);
      if (tokens.length < 4) continue;
      const faces = parseInt(tokens[1], 10);
      if (!isNaN(faces) && faces > 0) faceZones.push(tokens[0]);
    }
  }

  const cellZones = [];
  const czMatch = text.match(/Checking basic cellZone addressing[\s\S]*?CellZone\s+Cells\s+Points[\s\S]*?\n([\s\S]*?)Checking basic pointZone/);
  if (czMatch) {
    for (const line of czMatch[1].split('\n')) {
      const t = line.trim();
      if (!t || t.startsWith('-')) continue;
      const tokens = t.split(/\s+/);
      if (tokens.length < 3) continue;
      const cells = parseInt(tokens[1], 10);
      if (!isNaN(cells) && cells > 0) cellZones.push(tokens[0]);
    }
  }

  return { boundaries, faceZones, cellZones, patchFaces };
}

function buildRegionParts() {
  const out = {};
  for (const r of [...state.regions.fluids, ...state.regions.solids]) {
    const rp = state.region_parts[r] || { boundaries: [], cellZones: [], faceZones: [] };
    out[r] = { boundaries: rp.boundaries || [], cellZones: rp.cellZones || [], faceZones: rp.faceZones || [] };
  }
  out.cht_interfaces = state.region_parts.cht_interfaces || {};
  return out;
}

function buildMaterialProperties() {
  const out = {};
  for (const [region, val] of Object.entries(state.material_properties)) {
    if (typeof val === 'string') {
      out[region] = val;
    } else if (val && val.type === 'uniform') {
      if (val.kappa_type === 'anisotropic') {
        out[region] = { material: val.material, kappa_type: 'anisotropic', kappa: val.kappa };
        if (val.coordinate_system) out[region].coordinate_system = val.coordinate_system;
      } else {
        // Isotropic: kappa comes from library — do NOT write kappa or kappa_type to JSON
        out[region] = { material: val.material };
      }
    } else if (val && val.type === 'cell_zone_specific') {
      out[region] = { type: 'cell_zone_specific', properties: groupZoneMaterials(val.properties || {}, val.kappa_type) };
      if (val.kappa_type === 'anisotropic') {
        out[region].kappa_type = 'anisotropic';
        if (val.coordinate_system) out[region].coordinate_system = val.coordinate_system;
      }
    }
  }
  return out;
}

/** Custom JSON serializer:
 *  - Numeric arrays (all elements are numbers) → single line: [0, -9.81, 0]
 *  - String/mixed arrays → one item per line, indented
 *  - Objects → standard 4-space indentation
 */
function toSimInputsJSON(obj) {
  function serialize(val, depth) {
    const indent = '    '.repeat(depth);
    const innerIndent = '    '.repeat(depth + 1);

    if (val === null || typeof val === 'number' || typeof val === 'boolean') return JSON.stringify(val);
    if (typeof val === 'string') return JSON.stringify(val);

    if (Array.isArray(val)) {
      if (val.length === 0) return '[]';
      // All-numeric arrays (vectors, kappa) → compact single line
      if (val.every(v => typeof v === 'number')) return '[' + val.map(v => JSON.stringify(v)).join(', ') + ']';
      // String/mixed arrays → one item per line
      const items = val.map(v => innerIndent + serialize(v, depth + 1));
      return '[\n' + items.join(',\n') + '\n' + indent + ']';
    }

    if (typeof val === 'object') {
      const keys = Object.keys(val);
      if (keys.length === 0) return '{}';
      const entries = keys.map(k => innerIndent + JSON.stringify(k) + ': ' + serialize(val[k], depth + 1));
      return '{\n' + entries.join(',\n') + '\n' + indent + '}';
    }

    return JSON.stringify(val);
  }
  return serialize(obj, 0);
}

function buildExportJSON() {
  const incompressible = isIncompressibleSolver();

  // Pre-compute radiation object so it can be placed inline in the right position
  const radiationOut = !incompressible
    ? (() => {
        if (state.radiation.active) {
          const rad = deepClone(state.radiation);
          if (rad.model !== 'fvDOM') {
            delete rad.model_coeffs.nPhi;
            delete rad.model_coeffs.nTheta;
          }
          return rad;
        }
        return { active: false };
      })()
    : undefined;

  const out = {
    simulation: {
      type: state.simulation.type,
      solver_name: state.simulation.solver_name,
      end_time: state.run_settings.end_time,
      write_interval: state.run_settings.write_interval,
      num_cores: state.run_settings.num_cores,
      write_format: state.run_settings.write_format,
      write_precision: state.run_settings.write_precision,
      time_precision: state.run_settings.time_precision,
      ...(state.simulation.type === 'transient' ? {
        delta_t: state.run_settings.delta_t,
        adjust_timestep: state.run_settings.adjust_timestep,
        ...(state.run_settings.adjust_timestep ? {
          max_delta_t: state.run_settings.max_delta_t,
          max_co: state.run_settings.max_co,
          max_di: state.run_settings.max_di,
        } : {})
      } : {})
    },
    regions: state.regions,
    region_parts: buildRegionParts(),
    // gravity: section 4 — only for compressible solvers
    ...(!incompressible ? { gravity: state.gravity } : {}),
    reference_conditions: state.reference_conditions,
    material_properties: buildMaterialProperties(),
    turbulence: (() => {
      const t = state.turbulence;
      if (!t.active) return { active: false };
      const cfg = {
        active: true,
        type: t.type || 'RANS',
        RANS_config: {
          model: t.RANS_config.model,
          model_coeffs: { Prt: t.RANS_config.model_coeffs.Prt },
          wall_function: t.RANS_config.wall_function,
        }
      };
      if (!incompressible) {
        cfg.RANS_config.thermal_wall_function = t.RANS_config.thermal_wall_function;
      }
      return cfg;
    })(),
    // radiation: section 8 — only for compressible solvers
    ...(!incompressible ? { radiation: radiationOut } : {}),
    initial_conditions: (() => {
      const ic = deepClone(state.initial_conditions);
      if (!state.turbulence.active) {
        const turbFields = ['k', 'omega', 'epsilon', 'nut'];
        state.regions.fluids.forEach(region => {
          if (ic[region]) turbFields.forEach(f => delete ic[region][f]);
        });
      } else {
        // Strip the inactive turbulence secondary field based on model
        const secondaryField = currentThermalSecondaryLabel(); // 'omega' or 'epsilon'
        const staleField = secondaryField === 'omega' ? 'epsilon' : 'omega';
        state.regions.fluids.forEach(region => {
          if (ic[region]) delete ic[region][staleField];
        });
      }
      return ic;
    })(),
    boundary_conditions: (() => {
      const chtNames = getCHTBoundaryNames();
      const out = { cht_interfaces: deepClone(state.boundary_conditions.cht_interfaces || {}) };
      Object.keys(state.boundary_conditions).forEach(region => {
        if (region === 'cht_interfaces') return;
        out[region] = groupBCsForExport(state.boundary_conditions[region] || {}, region, chtNames);
      });
      return out;
    })(),
    faceZone_conditions: (() => {
      const activeFzc = {};
      Object.entries(state.faceZone_conditions).forEach(([region, zones]) => {
        const activeZones = uiState.activeFaceZones[region] || [];
        if (activeZones.length === 0) return;
        activeFzc[region] = {};
        activeZones.forEach(z => { if (zones[z]) activeFzc[region][z] = zones[z]; });
      });
      return activeFzc;
    })(),
    function_objects: state.function_objects,
    fv_options: state.fv_options,
    numerical_schemes: (() => {
      const ns = deepClone(state.numerical_schemes);
      if (state.simulation.type === 'steady-state') ns.time = 'none';
      if (incompressible) delete ns.convection.energy;
      if (!state.turbulence.active) delete ns.convection.turbulence;
      return ns;
    })(),
    matrix_solvers: state.matrix_solvers,
    iterative_solver: (() => {
      const is = deepClone(state.iterative_solver);
      if (state.simulation.type === 'steady-state') {
        // These fields are only meaningful for transient (PIMPLE) solvers
        delete is.max_outer_iterations;
        if (is.fluid) {
          delete is.fluid.momentum_predictor;
          delete is.fluid.solve_turb_once_per_timestep;
        }
      } else if (!state.turbulence.active && is.fluid) {
        // solve_turb_once_per_timestep is irrelevant when turbulence is inactive
        delete is.fluid.solve_turb_once_per_timestep;
      }
      return is;
    })(),
    convergence_criteria: (() => {
      const cc = deepClone(state.convergence_criteria);
      if (cc.fluid && cc.fluid.residuals) {
        if (incompressible) delete cc.fluid.residuals.energy;
        if (!state.turbulence.active) delete cc.fluid.residuals.turbulence;
      }
      return cc;
    })(),
    relaxation_factors: (() => {
      const rf = deepClone(state.relaxation_factors);
      if (rf.fluid) {
        if (incompressible) { delete rf.fluid.density; delete rf.fluid.energy; }
        if (!state.turbulence.active) delete rf.fluid.turbulence;
      }
      return rf;
    })()
  };

  return toSimInputsJSON(out);
}

function loadSimInputs(json) {
  let d;
  try {
    d = JSON.parse(json);
  } catch (e) {
    showMessage('error', `Failed to parse JSON: ${e.message}`);
    return false;
  }
  state.regions = d.regions || { fluids: [], solids: [] };
  state.region_parts = d.region_parts || { cht_interfaces: {} };
  if (!state.region_parts.cht_interfaces) state.region_parts.cht_interfaces = {};
  // Infer case_type from region composition (sim_inputs.json doesn't store this UI field)
  const _fluids = (state.regions.fluids || []).length;
  const _solids = (state.regions.solids || []).length;
  let _caseType = 'cht';
  if (_fluids === 1 && _solids === 0) _caseType = 'single-fluid';
  else if (_solids === 1 && _fluids === 0) _caseType = 'single-solid';
  state.simulation = { type: d.simulation.type, case_type: _caseType, solver_name: d.simulation.solver_name };
  state.run_settings = {
    end_time: d.simulation.end_time,
    write_interval: d.simulation.write_interval,
    num_cores: d.simulation.num_cores,
    write_format: d.simulation.write_format || 'binary',
    write_precision: d.simulation.write_precision ?? 6,
    time_precision: d.simulation.time_precision ?? 6,
    delta_t: d.simulation.delta_t ?? 0.001,
    adjust_timestep: d.simulation.adjust_timestep ?? true,
    max_delta_t: d.simulation.max_delta_t ?? 0.01,
    max_co: d.simulation.max_co ?? 1.0,
    max_di: d.simulation.max_di ?? 10.0,
  };
  state.gravity = d.gravity || [0, 0, 0];
  state.reference_conditions = d.reference_conditions || { pressure: 101325, temperature: 298.15 };
  state.material_properties = d.material_properties || {};
  // Explode any grouped zone keys and sync with mesh zones
  state.regions.solids.forEach(region => {
    const val = state.material_properties[region];
    if (val && val.type === 'cell_zone_specific') normalizeSolidMaterial(region);
  });
  state.turbulence = d.turbulence || state.turbulence;
  state.radiation = d.radiation || state.radiation;
  state.initial_conditions = d.initial_conditions || { method: 'uniform' };
  state.boundary_conditions = d.boundary_conditions || { cht_interfaces: {} };
  if (!state.boundary_conditions.cht_interfaces) state.boundary_conditions.cht_interfaces = {};
  // Explode grouped BC keys (e.g. "a, b": {...}) into per-patch entries
  Object.keys(state.boundary_conditions).forEach(region => {
    if (region === 'cht_interfaces') return;
    state.boundary_conditions[region] = explodeBCGroups(state.boundary_conditions[region]);
  });
  // Normalize emissivity defaults for wall BCs (backward compatibility with old JSONs)
  Object.keys(state.boundary_conditions).forEach(region => {
    if (region === 'cht_interfaces') return;
    Object.values(state.boundary_conditions[region] || {}).forEach(bc => {
      if ((bc?.type === 'no-slip-wall' || bc?.type === 'slip-wall') && bc.emissivity == null) {
        bc.emissivity = 0.9;
      }
    });
  });
  Object.values(state.boundary_conditions.cht_interfaces || {}).forEach(iface => {
    if (iface && iface.emissivity == null) iface.emissivity = 0.9;
  });
  state.faceZone_conditions = d.faceZone_conditions || {};
  // Restore activeFaceZones from existing faceZone_conditions
  uiState.activeFaceZones = {};
  Object.entries(state.faceZone_conditions).forEach(([region, zones]) => {
    uiState.activeFaceZones[region] = Object.keys(zones);
  });
  state.function_objects = d.function_objects || {};
  state.fv_options = d.fv_options || {};
  state.numerical_schemes = d.numerical_schemes || state.numerical_schemes;
  // Enforce correct time scheme based on loaded simulation type
  if (state.simulation.type === 'steady-state') state.numerical_schemes.time = 'none';
  else if (!state.numerical_schemes.time || state.numerical_schemes.time === 'none') state.numerical_schemes.time = 'CrankNicolson';
  state.matrix_solvers = d.matrix_solvers || state.matrix_solvers;
  state.iterative_solver = d.iterative_solver || state.iterative_solver;
  state.convergence_criteria = deepMerge(state.convergence_criteria, d.convergence_criteria || {});
  state.relaxation_factors   = deepMerge(state.relaxation_factors,   d.relaxation_factors   || {});
  state.initial_conditions.method = 'uniform';
  getAllRegions().forEach(region => ensureRegionData(region, regionType(region)));
  ensureSolverCompatibility();
  for (let i = 1; i <= 13; i++) uiState.visitedSteps.add(i);
  clearMessage();
  goToStep(1);
}

// ── Zone-material helpers ──────────────────────────────────────────────────

/** Split comma-separated BC group keys into per-patch entries. Idempotent. */
function explodeBCGroups(bcRegion) {
  const result = {};
  Object.entries(bcRegion || {}).forEach(([key, val]) => {
    const patches = key.split(',').map(s => s.trim()).filter(Boolean);
    if (patches.length <= 1) {
      result[key] = val;
    } else {
      patches.forEach(p => { result[p] = deepClone(val); });
    }
  });
  return result;
}

/** Group patches with identical BC configs into comma-joined keys for JSON export.
 *  __default__ is always first; CHT patches are excluded. */
function groupBCsForExport(bcRegion, region, chtNames) {
  const result = {};
  if (bcRegion['__default__']) result['__default__'] = bcRegion['__default__'];
  const groups = []; // [{patches, bcStr, bc}]
  Object.entries(bcRegion).forEach(([patch, bc]) => {
    if (patch === '__default__') return;
    if (chtNames && chtNames.has(region + ':' + patch)) return;
    const cleanedBC = cleanBCForExport(bc);
    const bcStr = JSON.stringify(cleanedBC);
    const existing = groups.find(g => g.bcStr === bcStr);
    if (existing) existing.patches.push(patch);
    else groups.push({ patches: [patch], bcStr, bc: cleanedBC });
  });
  groups.forEach(({ patches, bc }) => {
    result[patches.sort().join(', ')] = bc;
  });
  return result;
}

/** Explode grouped-key properties (from JSON) into per-zone entries. Idempotent.
 *  Strips legacy _assigned flags; skips entries that were _assigned:false (they fall to default). */
function explodeZoneMaterials(properties) {
  const out = {};
  Object.entries(properties).forEach(([key, entry]) => {
    if (key === 'default') {
      out.default = { material: entry.material || '' };
      if (entry.kappa !== undefined) out.default.kappa = entry.kappa;
      return;
    }
    // Skip zones that were unassigned in old format — they revert to default
    if (entry.hasOwnProperty('_assigned') && entry._assigned === false) return;
    key.split(',').map(z => z.trim()).filter(Boolean).forEach(zone => {
      const { _assigned, ...rest } = entry; // strip legacy flag
      out[zone] = deepClone(rest);
    });
  });
  if (!out.default) out.default = { material: '' };
  return out;
}

/** Merge per-zone properties with identical (material + kappa) into grouped keys for JSON export.
 *  Skips entries with no material (incomplete). Strips internal flags. */
function groupZoneMaterials(properties, kappa_type) {
  const isAniso = kappa_type === 'anisotropic';
  const groups = new Map(); // fingerprint → { zones[], entry }
  Object.entries(properties).forEach(([zone, entry]) => {
    if (zone === 'default') return;
    if (!entry.material) return; // skip unassigned — caught by default
    const kappaKey = isAniso ? (Array.isArray(entry.kappa) ? entry.kappa.join(',') : String(entry.kappa)) : '';
    const fp = `${entry.material}|${kappaKey}`;
    if (!groups.has(fp)) {
      const zoneEntry = isAniso ? { material: entry.material, kappa: entry.kappa } : { material: entry.material };
      groups.set(fp, { zones: [], entry: zoneEntry });
    }
    groups.get(fp).zones.push(zone);
  });
  const out = {};
  groups.forEach(({ zones, entry }) => { out[zones.sort().join(',')] = entry; });
  if (properties.default && properties.default.material) {
    out.default = isAniso
      ? { material: properties.default.material, kappa: properties.default.kappa }
      : { material: properties.default.material };
  }
  return out;
}

/** Returns override zone names (non-default) that are not present in the current mesh zone list.
 *  Used to flag stale overrides after mesh changes. Returns [] if mesh zones are unknown. */
function getStaleZoneOverrides(regionName) {
  const cfg = state.material_properties[regionName];
  if (!cfg || cfg.type !== 'cell_zone_specific') return [];
  const meshZones = state.region_parts[regionName]?.cellZones || [];
  if (meshZones.length === 0) return []; // mesh not loaded — cannot detect stale
  return Object.keys(cfg.properties).filter(z => z !== 'default' && !meshZones.includes(z));
}

/** Validates that all cell_zone_specific solid regions have a material selected for every entry.
 *  Shows an error message and returns false on failure; returns true if valid. */
function validateMaterialAssignments() {
  for (const region of state.regions.solids) {
    const cfg = state.material_properties[region];
    if (cfg?.type === 'cell_zone_specific') {
      const empty = Object.entries(cfg.properties).filter(([, e]) => !e.material);
      if (empty.length > 0) {
        const names = empty.map(([z]) => z === 'default' ? '[default]' : z).join(', ');
        showMessage('error', `Region "${region}": select a material for: ${names}.`);
        return false;
      }
    }
  }
  return true;
}

function getFirstTab(stepKey, items) {
  if (!items.length) return '';
  const saved = uiState.tabs[stepKey];
  if (saved && items.includes(saved)) return saved;
  uiState.tabs[stepKey] = items[0];
  return items[0];
}

function currentThermalSecondaryLabel() {
  const model = state.turbulence?.RANS_config?.model || 'kOmegaSST';
  return model === 'kEpsilon' || model === 'realizableKE' ? 'epsilon' : 'omega';
}

/**
 * Clean a single BC object for export — strip sub-config that belongs to an
 * inactive mode so the JSON exactly reflects the current UI state.
 */
function cleanBCForExport(bc) {
  bc = deepClone(bc);

  // Thermal: remove fields that belong to other modes
  if (bc.thermal && bc.thermal.mode) {
    const tMode = bc.thermal.mode;
    if (tMode === 'adiabatic') {
      delete bc.thermal.value;
      delete bc.thermal.htc;
      delete bc.thermal.ambient_temperature;
      delete bc.thermal.outer_emissivity;
      delete bc.thermal.thermal_layers;
      delete bc.thermal.time_varying;
    } else if (tMode === 'temperature') {
      delete bc.thermal.htc;
      delete bc.thermal.ambient_temperature;
      delete bc.thermal.outer_emissivity;
      delete bc.thermal.thermal_layers;
    } else if (tMode === 'heat-flux' || tMode === 'heat-transfer-rate') {
      delete bc.thermal.htc;
      delete bc.thermal.ambient_temperature;
      delete bc.thermal.outer_emissivity;
      delete bc.thermal.thermal_layers;
      delete bc.thermal.time_varying;
    } else if (tMode === 'heat-transfer-coefficient') {
      delete bc.thermal.value;
      delete bc.thermal.time_varying;
      // Safety net: ensure required fields are present even when loaded from an older JSON
      if (bc.thermal.htc == null) bc.thermal.htc = 0;
      if (bc.thermal.ambient_temperature == null) bc.thermal.ambient_temperature = state.reference_conditions.temperature;
      if (bc.thermal.outer_emissivity == null) bc.thermal.outer_emissivity = 0;
    }
  }

  // Turbulence dirichlet: strip the inactive secondary field (omega vs epsilon)
  // and ensure the active fields are initialized
  if (bc.turbulence && bc.turbulence.mode === 'dirichlet' && state.turbulence.active) {
    const activeField = currentThermalSecondaryLabel();
    const staleField = activeField === 'omega' ? 'epsilon' : 'omega';
    delete bc.turbulence[staleField];
    if (bc.turbulence.k == null) bc.turbulence.k = 1.0;
    if (bc.turbulence[activeField] == null) bc.turbulence[activeField] = 1000;
  }

  // Backflow conditions: strip turbulence dirichlet stale field and ensure active fields exist
  if (bc.backflow_conditions && bc.backflow_conditions.turbulence &&
      bc.backflow_conditions.turbulence.mode === 'dirichlet' && state.turbulence.active) {
    const activeField = currentThermalSecondaryLabel();
    const staleField = activeField === 'omega' ? 'epsilon' : 'omega';
    delete bc.backflow_conditions.turbulence[staleField];
    if (bc.backflow_conditions.turbulence.k == null) bc.backflow_conditions.turbulence.k = 1.0;
    if (bc.backflow_conditions.turbulence[activeField] == null) bc.backflow_conditions.turbulence[activeField] = 1000;
  }

  return bc;
}

/**
 * Returns a short warning string if the given step has incomplete/inconsistent
 * data, or null if the step looks complete. Used to show ⚠️ in the sidebar.
 */
function getStepWarning(step) {
  const regions = getAllRegions();

  if (step === 2) {
    // No regions imported yet
    if (regions.length === 0) return 'No regions defined';
  }

  if (step === 3) {
    // Any CHT interface with incomplete pair assignment
    const ifaces = state.region_parts?.cht_interfaces || {};
    for (const [, iface] of Object.entries(ifaces)) {
      const pair = iface.pair || [];
      if (pair.length < 2 || pair.some(p => !p.region || !p.boundary))
        return 'Incomplete CHT interface definition';
    }
  }

  if (step === 4) {
    // Any region has no material assigned
    for (const region of regions) {
      if (!state.material_properties[region]) return `No material for "${region}"`;
    }
  }

  if (step === 6) {
    // Any non-CHT patch in any region has no BC type set
    if (regions.length > 0) {
      const chtNames = getCHTBoundaryNames();
      for (const region of regions) {
        const patches = (state.region_parts[region]?.boundaries || [])
          .filter(p => !chtNames.has(region + ':' + p));
        const bcRegion = state.boundary_conditions[region] || {};
        for (const patch of patches) {
          if (!bcRegion[patch] || !bcRegion[patch].type)
            return `No BC for "${patch}" in "${region}"`;
        }
      }
    }
  }

  if (step === 9) {
    // Any region has no IC defined
    for (const region of regions) {
      if (!state.initial_conditions[region]) return `No IC for "${region}"`;
    }
  }

  return null;
}

function renderSidebar() {
  const el = document.getElementById('sidebar-steps');
  el.innerHTML = STEP_TITLES.map((title, idx) => {
    const step = idx + 1;
    const visited = uiState.visitedSteps.has(step);
    const active = uiState.currentStep === step;
    const done = visited && step < uiState.currentStep;
    const warning = visited ? getStepWarning(step) : null;
    const classes = ['step-item'];
    if (visited) classes.push('clickable');
    if (active) classes.push('active');
    if (done && !warning) classes.push('done');
    if (warning) classes.push('warn');
    const indexHtml = (done && !warning) ? '' : String(step);
    const warnIcon = warning ? `<span class="step-warn-icon" title="${escHtml(warning)}">⚠️</span>` : '';
    return `<li class="${classes.join(' ')}" data-action="goto-step" data-step="${step}"><span class="step-index">${indexHtml}</span><span class="step-label">${escHtml(title)}</span>${warnIcon}</li>`;
  }).join('');
}

function stepSubtitle(step) {
  const subtitles = {
    1: 'Configure solver type, working directory, and input data folder.',
    2: 'Import checkMesh logs to populate regions, boundaries, cellZones, and faceZones.',
    3: 'Connect fluid and solid boundaries into CHT pairs and thermal layers. Skipped for single-region cases.',
    4: 'Assign region materials and manage the embedded materials library.',
    5: 'Configure gravity, reference conditions, turbulence, and radiation.',
    6: 'Set boundary conditions per region and patch.',
    7: 'Configure internal surface fan conditions (baffles) for fluid regions.',
    8: 'Add fvOptions heat sources by region or cellZone.',
    9: 'Define uniform initial conditions for all regions.',
    10: 'Create monitoring function objects for zones and patches.',
    11: 'Tune discretization, solvers, convergence, and relaxation settings.',
    12: 'Set runtime controls: end time, write interval, and parallel cores.',
    13: 'Review the generated JSON and export sim_inputs.json.'
  };
  return subtitles[step] || '';
}

function renderCurrentStep() {
  activeCsvPanels.clear();
  ensureSolverCompatibility();
  renderSidebar();
  document.getElementById('main-title').textContent = STEP_TITLES[uiState.currentStep - 1];
  document.getElementById('main-subtitle').textContent = stepSubtitle(uiState.currentStep);
  document.getElementById('step-counter').textContent = `Step ${uiState.currentStep} of 13`;
  document.getElementById('step-content').innerHTML = renderStep(uiState.currentStep);
  document.getElementById('prev-step-btn').disabled = uiState.currentStep === 1;
  document.getElementById('next-step-btn').disabled = uiState.currentStep === 13;
}

function renderMessageHtml() {
  if (!uiState.messages.text) return '';
  const cls = uiState.messages.type === 'success' ? 'success-box' : (uiState.messages.type === 'error' ? 'warning-box' : 'note');
  return `<div class="${cls}">${escHtml(uiState.messages.text)}</div>`;
}

function goToStep(step) {
  if (step < 1 || step > 13) return;
  if (!uiState.visitedSteps.has(step)) return;
  uiState.currentStep = step;
  renderCurrentStep();
}

function goNext() {
  if (uiState.currentStep >= 13) return;
  if (hasPendingCsvExports()) {
    showMessage('error', 'Export all CSV files before proceeding to the next step.');
    return;
  }
  if (uiState.currentStep === 4 && !validateMaterialAssignments()) return;
  uiState.visitedSteps.add(uiState.currentStep + 1);
  uiState.currentStep += 1;
  renderCurrentStep();
}

function goPrev() {
  if (uiState.currentStep <= 1) return;
  uiState.currentStep -= 1;
  renderCurrentStep();
}

function selectHtml(options, selected, placeholder) {
  const pre = placeholder ? `<option value="">${escHtml(placeholder)}</option>` : '';
  return pre + options.map(opt => `<option value="${escHtml(opt)}" ${opt === selected ? 'selected' : ''}>${escHtml(opt)}</option>`).join('');
}

function renderTabs(stepKey, items, active) {
  return `<div class="tabs">${items.map(item => `<button type="button" class="tab-btn ${item === active ? 'active' : ''}" data-action="select-tab" data-tab-key="${escHtml(stepKey)}" data-tab-value="${escHtml(item)}">${escHtml(item === '__cht__' ? 'CHT Interfaces' : item)}</button>`).join('')}</div>`;
}

function renderStep(step) {
  switch (step) {
    case 1: return renderStep1();
    case 2: return renderStep2();
    case 3: return renderStep3();
    case 4: return renderStep4();
    case 5: return renderStep5();
    case 6: return renderStep6();
    case 7: return renderStep7();
    case 8: return renderStep8();
    case 9: return renderStep9();
    case 10: return renderStep10();
    case 11: return renderStep11();
    case 12: return renderStep12();
    case 13: return renderStep13();
    default: return '';
  }
}

function buildChtPatchOwnerMap() {
  // Returns a map of "region:boundary" → interface name for all assigned patches
  const owner = {};
  Object.entries(state.region_parts.cht_interfaces || {}).forEach(([ifaceName, iface]) => {
    (iface.pair || []).forEach(p => { if (p.region && p.boundary) owner[p.region + ':' + p.boundary] = ifaceName; });
  });
  return owner;
}

  const boundaries = state.region_parts[regionName]?.boundaries || [];

  const owner = buildChtPatchOwnerMap();
  return `<div class="pill-row" style="max-height:160px;overflow-y:auto;padding-right:4px;">${boundaries.map(boundary => {
    const usedBy = owner[regionName + ':' + boundary];

      return `<button type="button" class="pill" disabled title="Already used in ${escHtml(usedBy)}" style="opacity:0.45;cursor:not-allowed;background:#f0f0f0;border-color:#ccc;color:#888;">${escHtml(boundary)}<span style="font-size:10px;margin-left:5px;color:#999;">→ ${escHtml(usedBy)}</span></button>`;

function renderStep3() {
  const allRegions = getAllRegions();

  // Single-region: CHT interfaces are not applicable
  if (allRegions.length === 1) {
    return `

      <div class="info-box">
        <strong>Not applicable for single-region simulations.</strong><br>
        CHT interfaces connect boundaries between fluid and solid regions. With only one region defined, no interfaces are needed.
        Proceed to the next step.
      </div>
    `;
  }

  const selection = uiState.chtSelection;

  // Initialise defaults
  if (!selection.regionA || !allRegions.includes(selection.regionA)) selection.regionA = allRegions[0] || '';
  if (!selection.regionB || !allRegions.includes(selection.regionB) || selection.regionB === selection.regionA) {
    selection.regionB = allRegions.find(r => r !== selection.regionA) || '';
  }
  // Clear stale patch selections
  if (selection.regionA && !(state.region_parts[selection.regionA]?.boundaries || []).includes(selection.patchA)) selection.patchA = '';
  if (selection.regionB && !(state.region_parts[selection.regionB]?.boundaries || []).includes(selection.patchB)) selection.patchB = '';

  const interfaces = Object.keys(state.region_parts.cht_interfaces || {});
  const canLink = !!(selection.regionA && selection.regionB && selection.regionA !== selection.regionB && selection.patchA && selection.patchB);

  // Auto-detect conformal from face counts when both patches selected
  const facesA = (selection.regionA && selection.patchA) ? state.region_parts[selection.regionA]?.patchFaces?.[selection.patchA] : null;
  const facesB = (selection.regionB && selection.patchB) ? state.region_parts[selection.regionB]?.patchFaces?.[selection.patchB] : null;

        : `<span style="font-size:11px;color:#888;">Face count data unavailable — set manually</span>`)

  const pairingBody = allRegions.length < 2
    ? `<div class="info-box">Need at least two regions to form an interface. Add more regions in Step 2.</div>`
    : `
      <div class="two-col">
        <div class="bc-block">
          <div class="bc-block-title">Region A</div>
          <div class="field-group" style="margin-bottom:10px;">
            <select data-action="set-cht-region" data-side="A" style="width:100%;">
              ${regOpts(allRegions.filter(r => r !== selection.regionB), selection.regionA)}

        </div>
        <div class="bc-block">
          <div class="bc-block-title">Region B</div>
          <div class="field-group" style="margin-bottom:10px;">
            <select data-action="set-cht-region" data-side="B" style="width:100%;">
              ${regOpts(allRegions.filter(r => r !== selection.regionA), selection.regionB)}
            </select>
          </div>
          ${selection.regionB ? renderPatchList(selection.regionB, 'B') : ''}
        </div>
      </div>
      <div style="margin-top:14px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
          <input type="checkbox" data-action="set-cht-conformal" ${selection.conformal ? 'checked' : ''}>
          <span style="font-weight:600;">Conformal interface</span>
        </label>
        ${conformalNote}
        <button type="button" class="btn btn-primary" data-action="link-cht-interface" ${canLink ? '' : 'disabled'}>Link as CHT Interface</button>
      </div>`;

  return `
    ${renderMessageHtml()}
    ${allRegions.length === 0 ? '<div class="info-box">Add at least one region in Step 2 first.</div>' : ''}
    <div class="card">
      <div class="card-title">🔗 Interface Pairing</div>
      ${pairingBody}
    </div>
    <div class="card">
      <div class="card-title">🌡️ Defined Interfaces <span class="badge">${interfaces.length}</span></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Interface Name</th><th>Region A / Patch</th><th>Region B / Patch</th><th>Conformal</th><th></th></tr>
          </thead>
          <tbody>
            ${interfaces.length ? interfaces.map(name => {
              const item = state.region_parts.cht_interfaces[name];
              const sideA = item.pair?.[0];
              const sideB = item.pair?.[1];
              return `
                <tr>
                  <td><span class="code-inline">${escHtml(name)}</span></td>
                  <td>${escHtml(sideA?.region || '')} / <span class="code-inline">${escHtml(sideA?.boundary || '')}</span></td>
                  <td>${escHtml(sideB?.region || '')} / <span class="code-inline">${escHtml(sideB?.boundary || '')}</span></td>
                  <td><label style="cursor:pointer;display:flex;align-items:center;gap:5px;justify-content:center;"><input type="checkbox" data-action="set-cht-conformal" data-interface="${escHtml(name)}" ${item.conformal ? 'checked' : ''}> conformal</label></td>
                  <td><button type="button" class="del-btn" data-action="delete-interface" data-interface="${escHtml(name)}">×</button></td>
                </tr>`;
            }).join('') : `<tr><td colspan="5" class="no-data">No interfaces created yet.</td></tr>`}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function renderVectorInputs(prefixAction, attrs, vec, extraClass = '', showLabels = true) {
  const lbl = (c) => showLabels ? `<span class="axis">${c}</span>` : '';
  return `
    <div class="vector-inputs${extraClass ? ' ' + extraClass : ''}">
      ${lbl('x')}<input type="number" step="any" value="${vec[0] ?? 0}" ${attrs('0')}>
      ${lbl('y')}<input type="number" step="any" value="${vec[1] ?? 0}" ${attrs('1')}>
      ${lbl('z')}<input type="number" step="any" value="${vec[2] ?? 0}" ${attrs('2')}>
    </div>
  `;
}

function renderCoordinateSystem(regionName, scope, coordinateSystem) {
  const c = coordinateSystem || { origin: [0, 0, 0], e1: [1, 0, 0], e2: [0, 1, 0] };
  const vec = (label, path, val) => {
    const attrs = idx => `data-action="set-solid-path" data-region="${escHtml(regionName)}" data-path="${scope}.${path}.${idx}" data-kind="number"`;
    return `<div class="mat-kv-row">
      <label>${label}</label>
      ${renderVectorInputs('set-solid-path', attrs, val, 'compact-kappa', false)}
    </div>`;
  };
  return `
    <div class="coord-box">
      <div class="coord-box-title">📐 Coordinate System</div>
      <div class="mat-kv">
        ${vec('Origin', 'origin', c.origin)}
        ${vec('e1', 'e1', c.e1)}
        ${vec('e2', 'e2', c.e2)}
      </div>
    </div>
  `;
}

function renderSolidMaterialSection(regionName) {
  normalizeSolidMaterial(regionName);
  const cfg = state.material_properties[regionName];
  const solidOptions = materialOptionsHtml('solid', cfg.material || '');

  const uniformBlock = cfg.type === 'uniform' ? (() => {
    const isIso = cfg.kappa_type !== 'anisotropic';
    const libKappa = materialLib.merged[cfg.material]?.kappa ?? '—';
    return `
      <div class="mat-kv">
        <div class="mat-kv-row">
          <label>Material</label>
          <select data-action="set-solid-path" data-region="${escHtml(regionName)}" data-path="material" data-kind="string" data-rerender="1">${solidOptions}</select>
        </div>
        <div class="mat-kv-row">
          <label>Kappa Type</label>
          <select data-action="set-solid-path" data-region="${escHtml(regionName)}" data-path="kappa_type" data-kind="string" data-rerender="1">
            <option value="isotropic" ${isIso ? 'selected' : ''}>isotropic</option>
            <option value="anisotropic" ${!isIso ? 'selected' : ''}>anisotropic</option>
          </select>
        </div>
        ${isIso ? `
        <div class="mat-kv-row">
          <label>Thermal Conductivity</label>
          <span class="kv-value">${libKappa} W/m·K</span>
          <span class="footer-note">(from library: ${escHtml(cfg.material || '')})</span>
        </div>` : `
        <div class="mat-kv-row">
          <label>Kappa [kx, ky, kz]</label>
          ${renderVectorInputs('set-solid-path', idx => `data-action="set-solid-path" data-region="${escHtml(regionName)}" data-path="kappa.${idx}" data-kind="number"`, Array.isArray(cfg.kappa) ? cfg.kappa : [1, 1, 1], 'compact-kappa', false)}
        </div>`}
      </div>
      ${!isIso ? renderCoordinateSystem(regionName, 'coordinate_system', cfg.coordinate_system) : ''}
    `;
  })() : `
    <div class="mat-kv" style="margin-bottom:10px;">
      <div class="mat-kv-row">
        <label>Global Kappa Type</label>
        <select data-action="set-solid-path" data-region="${escHtml(regionName)}" data-path="kappa_type" data-kind="string" data-rerender="1">
          <option value="isotropic" ${cfg.kappa_type === 'isotropic' ? 'selected' : ''}>isotropic</option>
          <option value="anisotropic" ${cfg.kappa_type === 'anisotropic' ? 'selected' : ''}>anisotropic</option>
        </select>
      </div>
    </div>
    ${cfg.kappa_type === 'anisotropic' ? renderCoordinateSystem(regionName, 'coordinate_system', cfg.coordinate_system) : ''}
    <div style="margin-top:12px;">
      ${renderZoneMaterialTable(regionName, cfg)}
    </div>
    ${renderZoneCopyPanel(regionName)}
  `;

  return `
    <div class="card">
      <div class="card-title">🧱 ${escHtml(regionName)}</div>
      <div class="field-group" style="margin-bottom:12px;">
        <label>Assignment Mode</label>
        <div class="radio-group">
          <label><input type="radio" name="solid-mode-${escHtml(regionName)}" value="uniform" data-action="set-solid-mode" data-region="${escHtml(regionName)}" ${cfg.type === 'uniform' ? 'checked' : ''}> Uniform</label>
          <label><input type="radio" name="solid-mode-${escHtml(regionName)}" value="cell_zone_specific" data-action="set-solid-mode" data-region="${escHtml(regionName)}" ${cfg.type === 'cell_zone_specific' ? 'checked' : ''}> Cell-zone specific</label>
        </div>
      </div>
      ${uniformBlock}
    </div>
  `;
}

function renderZoneMaterialTable(regionName, cfg) {
  const props = cfg.properties || {};
  const isAniso = cfg.kappa_type === 'anisotropic';
  const kappaHeader = isAniso ? 'Kappa [kx, ky, kz] (W/m·K)' : 'Conductivity (W/m·K)';

  const defaultEntry = props.default || { material: '' };
  const meshZones = state.region_parts[regionName]?.cellZones || [];
  const overrideEntries = Object.entries(props).filter(([z]) => z !== 'default');
  const availableZones = meshZones.filter(z => !(z in props));
  const staleZones = getStaleZoneOverrides(regionName);

  const makeKappaCell = (zone, entry) => {
    if (isAniso) {
      return renderVectorInputs('set-zone-kappa-index', idx =>
        `data-action="set-zone-kappa-index" data-region="${escHtml(regionName)}" data-zone="${escHtml(zone)}" data-index="${idx}" data-kind="number"`,
        Array.isArray(entry.kappa) ? entry.kappa : [1, 1, 1], 'compact-kappa', false);
    }
    if (!entry.material) return `<span style="color:#aaa;font-size:13px;">—</span>`;
    const libKappa = materialLib.merged[entry.material]?.kappa ?? '—';
    return `<span style="color:#555;font-size:13px;">${libKappa}</span> <span class="footer-note" style="font-size:11px;">(library)</span>`;
  };

  const rowStyle = (entry) => !entry.material ? ' style="outline:2px solid #fca5a5;outline-offset:-2px;"' : '';
  const invalidNote = (entry) => !entry.material
    ? `<div style="color:#dc2626;font-size:11px;margin-top:3px;">⚠ Material required</div>` : '';

  // Default row — always first, no delete button
  const defaultRow = `
    <tr${rowStyle(defaultEntry)} style="background:#f8fafc;${!defaultEntry.material ? 'outline:2px solid #fca5a5;outline-offset:-2px;' : ''}">
      <td>
        <span class="badge" style="background:#64748b;padding:3px 10px;color:#fff;">default</span>
        <span style="font-size:11px;color:#64748b;margin-left:8px;">catch-all for unoverridden zones</span>
        ${invalidNote(defaultEntry)}
      </td>
      <td>
        <select style="width:100%;" data-action="set-zone-material" data-region="${escHtml(regionName)}" data-zone="default" data-rerender="1">
          ${materialOptionsHtml('solid', defaultEntry.material)}
        </select>
      </td>
      <td>${makeKappaCell('default', defaultEntry)}</td>
      <td></td><td></td>
    </tr>`;

  // Explicit override rows
  const overrideRows = overrideEntries.map(([zone, entry]) => {
    const isStale = staleZones.includes(zone);
    const copyDisabled = !entry.material ? 'disabled title="Select a material first"' : '';
    return `
      <tr${rowStyle(entry)}>
        <td>
          <span class="code-inline">${escHtml(zone)}</span>
          ${isStale ? `<span style="background:#f59e0b;color:#fff;font-size:10px;padding:1px 6px;border-radius:3px;margin-left:6px;" title="This zone was not found in the loaded mesh">⚠ not in mesh</span>` : ''}
          ${invalidNote(entry)}
        </td>
        <td>
          <select style="width:100%;" data-action="set-zone-material" data-region="${escHtml(regionName)}" data-zone="${escHtml(zone)}" data-rerender="1">
            ${materialOptionsHtml('solid', entry.material)}
          </select>
        </td>
        <td>${makeKappaCell(zone, entry)}</td>
        <td>
          <button type="button" class="btn btn-secondary btn-sm" data-action="open-zone-copy-panel"
            data-region="${escHtml(regionName)}" data-zone="${escHtml(zone)}" ${copyDisabled}>⎘ Copy</button>
        </td>
        <td>
          <button type="button" class="btn btn-danger btn-sm" data-action="delete-zone-override"
            data-region="${escHtml(regionName)}" data-zone="${escHtml(zone)}">✕</button>
        </td>
      </tr>`;
  }).join('');

  // Add-zone row — only when there are mesh zones not yet overridden
  const addRow = availableZones.length > 0 ? `
    <tr style="background:#f0fdf4;">
      <td colspan="5" style="padding:6px 10px;">
        <select data-action="add-zone-override" data-region="${escHtml(regionName)}" style="font-size:12px;max-width:320px;">
          <option value="">+ Add zone override…</option>
          ${availableZones.map(z => `<option value="${escHtml(z)}">${escHtml(z)}</option>`).join('')}
        </select>
      </td>
    </tr>` : '';

  // Info bar
  const totalMeshZones = meshZones.length;
  const assignedCount = overrideEntries.filter(([, e]) => !!e.material).length;
  const infoBar = totalMeshZones > 0 ? `
    <div style="margin-top:8px;font-size:12px;color:#64748b;">
      ${assignedCount} of ${totalMeshZones} mesh zone${totalMeshZones !== 1 ? 's' : ''} have explicitly assigned material properties.
      ${assignedCount < totalMeshZones ? 'Remaining resort to the default entry.' : ''}
      ${staleZones.length > 0 ? `<span style="color:#b45309;"> | ⚠ ${staleZones.length} override${staleZones.length > 1 ? 's' : ''} not found in current mesh.</span>` : ''}
    </div>` : '';

  return `
    <div class="table-wrap ${isAniso ? 'aniso-table' : ''}">
      <table style="width:100%;">
        <thead>
          <tr>
            <th style="min-width:200px;">Cell Zone</th>
            <th style="min-width:180px;">Material</th>
            <th style="min-width:140px;">${escHtml(kappaHeader)}</th>
            <th style="min-width:85px;"></th>
            <th style="min-width:44px;"></th>
          </tr>
        </thead>
        <tbody>
          ${defaultRow}
          ${overrideRows}
          ${addRow}
        </tbody>
      </table>
    </div>
    ${infoBar}`;
}

function renderZoneCopyPanel(regionName) {
  const panel = uiState.zoneCopyPanel;
  if (!panel.open || panel.sourceRegion !== regionName) return '';
  const cfg = state.material_properties[regionName];
  const { sourceZone, selected } = panel;
  const sourceEntry = cfg.properties[sourceZone];

  // Guard: source zone may have been deleted while panel was open
  if (!sourceEntry) {
    uiState.zoneCopyPanel = { open: false, sourceRegion: '', sourceZone: '', selected: [] };
    return '';
  }

  const meshZones = state.region_parts[regionName]?.cellZones || [];
  // Zones available for copy = mesh zones not yet in the override list at all
  const availableZones = meshZones.filter(z => z !== sourceZone && !(z in cfg.properties));
  // Zones already overridden (excluding source and default) — shown in note only
  const alreadyOverriddenCount = Object.keys(cfg.properties).filter(z => z !== 'default' && z !== sourceZone).length;

  return `
    <div class="zone-copy-overlay" id="zone-copy-overlay">
      <div class="zone-copy-panel">
        <div class="zone-copy-title">⎘ Copy material from: <code>${escHtml(sourceZone)}</code></div>
        <div style="font-size:13px;color:#555;margin-bottom:12px;">
          Material: <strong>${escHtml(sourceEntry?.material || '')}</strong>
          ${cfg.kappa_type === 'anisotropic' ? ` &nbsp;|&nbsp; Kappa: [${(Array.isArray(sourceEntry?.kappa) ? sourceEntry.kappa : [1,1,1]).join(', ')}]` : ''}
        </div>
        <div style="font-size:13px;font-weight:600;margin-bottom:8px;color:#334155;">Add overrides to zones (not yet in list):</div>
        ${availableZones.length === 0
          ? `<div class="info-box">All mesh zones already have overrides. Nothing to copy to.</div>`
          : `<div style="max-height:220px;overflow-y:auto;border:1px solid #e2e8f0;border-radius:6px;padding:8px 12px;">
              ${availableZones.map(z => `
                <label style="display:block;padding:3px 0;">
                  <input type="checkbox" data-action="toggle-zone-copy-select" data-zone="${escHtml(z)}" ${selected.includes(z) ? 'checked' : ''}>
                  <span class="code-inline" style="font-size:12px;">${escHtml(z)}</span>
                </label>`).join('')}
             </div>
             ${alreadyOverriddenCount > 0
               ? `<div style="font-size:11px;color:#94a3b8;margin-top:8px;">ℹ ${alreadyOverriddenCount} zone${alreadyOverriddenCount > 1 ? 's' : ''} already have material overrides and are not shown here.</div>`
               : ''}`}
        <div style="margin-top:16px;display:flex;gap:10px;justify-content:flex-end;">
          <button type="button" class="btn btn-secondary" data-action="close-zone-copy-panel">Cancel</button>
          <button type="button" class="btn btn-primary" data-action="apply-zone-copy" ${selected.length === 0 ? 'disabled' : ''}>Apply ✓</button>
        </div>
      </div>
    </div>`;
}

    name: '',
    _description: '',
    _type: 'fluid',
    molecular_weight: 28.96,
    rho: { model: 'constant', value: 1.0, coefficients: [0, 0, 0, 0, 0, 0, 0, 0] },
    Cp: { model: 'constant', value: 1000, coefficients: [0, 0, 0, 0, 0, 0, 0, 0] },
    mu: { model: 'constant', value: 1e-5, coefficients: [0, 0, 0, 0, 0, 0, 0, 0] },
    kappa: { model: 'constant', value: 0.1, coefficients: [0, 0, 0, 0, 0, 0, 0, 0] },
    solid_rho: 1000,
    solid_Cp: 500,

  };
}

function renderPropertyModelEditor(prefix, prop) {
  const label = PROP_LABELS[prefix] || prefix;
  return `
    <div class="field-grid compact">
      <div class="field-group">
        <label>${escHtml(label)} model</label>
        <select data-action="set-new-material-prop" data-prop="${escHtml(prefix)}" data-path="model" data-rerender="1">
          <option value="constant" ${prop.model === 'constant' ? 'selected' : ''}>constant</option>
          ${prefix === 'rho' ? `<option value="ideal-gas" ${prop.model === 'ideal-gas' ? 'selected' : ''}>ideal-gas</option><option value="ideal-gas-temperature-only" ${prop.model === 'ideal-gas-temperature-only' ? 'selected' : ''}>ideal-gas-temperature-only</option>` : ''}
          <option value="polynomial" ${prop.model === 'polynomial' ? 'selected' : ''}>polynomial</option>
        </select>
      </div>
      ${(prop.model === 'constant') ? `<div class="field-group"><label>${escHtml(label)} value</label><input type="number" step="any" value="${prop.value ?? 0}" data-action="set-new-material-prop" data-prop="${escHtml(prefix)}" data-path="value" data-kind="number"></div>` : ''}
    </div>
    ${prop.model === 'polynomial' ? `
      <div class="field-group" style="margin-top:10px;">
        <label>${escHtml(label)} coefficients [8]</label>

          ${(prop.coefficients || [0,0,0,0,0,0,0,0]).map((v, idx) => `<input type="number" step="any" value="${v}" data-action="set-new-material-coeff" data-prop="${escHtml(prefix)}" data-index="${idx}" data-kind="number">`).join('')}

function renderMaterialDetail(data) {
  if (data._type === 'solid') {
    return `
      <table style="width:100%; border-collapse:collapse; font-size:12px;">
        <thead><tr><th style="text-align:left; padding:4px 8px; background:#f0f4f8; color:#444;">Property</th><th style="text-align:left; padding:4px 8px; background:#f0f4f8; color:#444;">Value</th><th style="text-align:left; padding:4px 8px; background:#f0f4f8; color:#444;">Unit</th></tr></thead>
        <tbody>
          <tr><td style="padding:3px 8px;">Molecular Weight</td><td style="padding:3px 8px;">${data.molecular_weight ?? '—'}</td><td style="padding:3px 8px;">g/mol</td></tr>
          <tr style="background:#fafbfc;"><td style="padding:3px 8px;">Density</td><td style="padding:3px 8px;">${data.rho ?? '—'}</td><td style="padding:3px 8px;">kg/m³</td></tr>
          <tr><td style="padding:3px 8px;">Specific Heat Capacity</td><td style="padding:3px 8px;">${data.Cp ?? '—'}</td><td style="padding:3px 8px;">J/kg·K</td></tr>
          <tr style="background:#fafbfc;"><td style="padding:3px 8px;">Thermal Conductivity</td><td style="padding:3px 8px;">${data.kappa ?? '—'}</td><td style="padding:3px 8px;">W/m·K</td></tr>
        </tbody>
      </table>`;
  }
  // Fluid
  const propRows = [
    { label: 'Molecular Weight', key: null, val: data.molecular_weight, unit: 'g/mol' },
    { label: 'Density', key: 'rho', unit: 'kg/m³' },
    { label: 'Specific Heat Capacity', key: 'Cp', unit: 'J/kg·K' },
    { label: 'Dynamic Viscosity', key: 'mu', unit: 'Pa·s' },
    { label: 'Thermal Conductivity', key: 'kappa', unit: 'W/m·K' }
  ];
  return `
    <table style="width:100%; border-collapse:collapse; font-size:12px;">
      <thead><tr>
        <th style="text-align:left; padding:4px 8px; background:#f0f4f8; color:#444;">Property</th>
        <th style="text-align:left; padding:4px 8px; background:#f0f4f8; color:#444;">Model</th>
        <th style="text-align:left; padding:4px 8px; background:#f0f4f8; color:#444;">Value / Coefficients</th>
        <th style="text-align:left; padding:4px 8px; background:#f0f4f8; color:#444;">Unit</th>
      </tr></thead>
      <tbody>
        ${propRows.map((p, i) => {
          const bg = i % 2 === 1 ? 'background:#fafbfc;' : '';
          if (p.key === null) {
            return `<tr style="${bg}"><td style="padding:3px 8px;">${p.label}</td><td colspan="2" style="padding:3px 8px;">${p.val ?? '—'}</td><td style="padding:3px 8px;">${p.unit}</td></tr>`;
          }
          const prop = data[p.key];
          if (!prop) return '';
          let valCell = '—';
          if (prop.model === 'constant') valCell = prop.value;
          else if (prop.model === 'ideal-gas') valCell = '<em>ideal gas (p, T)</em>';
          else if (prop.model === 'ideal-gas-temperature-only') valCell = '<em>ideal gas (T only)</em>';
          else if (prop.model === 'polynomial' && prop.coefficients) {
            const nonzero = prop.coefficients.filter(v => v !== 0);
            valCell = `<span title="${prop.coefficients.join(', ')}" style="cursor:help;">[${nonzero.length} non-zero coefficients — hover to see all]</span>`;
          }
          return `<tr style="${bg}"><td style="padding:3px 8px;">${p.label}</td><td style="padding:3px 8px;"><span class="code-inline">${prop.model}</span></td><td style="padding:3px 8px;">${valCell}</td><td style="padding:3px 8px;">${p.unit}</td></tr>`;
        }).join('')}
      </tbody>
    </table>`;
}

        <thead>

                <td>${escHtml(data._description || '')}</td>

        <div class="field-group">
