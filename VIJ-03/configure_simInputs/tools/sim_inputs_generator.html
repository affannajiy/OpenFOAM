/** Build a map of csv_file filename → {ctxKey, numComponents} from current state. */
function buildCsvFileIndex() {
  const index = new Map();
  // FaceZone fan curves
  Object.entries(state.faceZone_conditions).forEach(([region, zones]) => {
    Object.entries(zones || {}).forEach(([zone, cfg]) => {
      const fn = cfg?.fan_curve?.csv_file;
      if (fn) index.set(fn, { ctxKey: `fz|${region}|${zone}|fan_curve`, numComponents: 1 });
    });
  });
  // Boundary condition time-varying fields
  Object.entries(state.boundary_conditions).forEach(([region, patches]) => {
    if (region === 'cht_interfaces') return;
    Object.entries(patches || {}).forEach(([patch, bc]) => {
      const velMode = bc?.velocity?.mode;
      if ((velMode === 'time-varying' || velMode === 'components-time-varying') && bc.velocity.time_varying?.csv_file) {
        index.set(bc.velocity.time_varying.csv_file, { ctxKey: `bc|${region}|${patch}|velocity.time_varying`, numComponents: 3 });
      }
      if (bc?.thermal?.mode === 'time-varying' && bc.thermal.time_varying?.csv_file) {
        index.set(bc.thermal.time_varying.csv_file, { ctxKey: `bc|${region}|${patch}|thermal.time_varying`, numComponents: 1 });
      }
    });
  });
  return index;
}

/** Load CSV files referenced in state from a FileSystemDirectoryHandle (inputData/). */
async function autoLoadCsvFiles(inputDataHandle) {
  const index = buildCsvFileIndex();
  let loaded = 0;
  for (const [filename, { ctxKey, numComponents }] of index) {
    if (!filename) continue;
    try {
      const fh = await inputDataHandle.getFileHandle(filename);
      const file = await fh.getFile();
      const text = await file.text();
      const parsed = parseCsvText(text);
      if (!parsed.length) continue;
      const maxCols = Math.max(...parsed.map(r => r.length));
      const rows = parsed.map(r => { while (r.length < maxCols) r.push(''); return r; });
      const panel = getCsvPanel(ctxKey, numComponents);
      panel.rows = rows;
      panel.dirty = false;
      panel.loaded = true;
      loaded++;
    } catch { /* file may not exist yet, skip silently */ }
  }
  return loaded;
}

/** Apply a parsed JSON object as sim_inputs or draft (shared logic for folder + file loading). */
function applyLoadedJsonData(data) {
  if (data.__sim_inputs_draft) {
    Object.assign(state, data.state);
    if (!state.simulation.case_type) {
      const _f = (state.regions?.fluids || []).length;
      const _s = (state.regions?.solids || []).length;
      if (_f === 1 && _s === 0) state.simulation.case_type = 'single-fluid';
      else if (_s === 1 && _f === 0) state.simulation.case_type = 'single-solid';
      else state.simulation.case_type = 'cht';
    }
    if (state.simulation.type === 'steady-state') state.numerical_schemes.time = 'none';
    else if (!state.numerical_schemes.time || state.numerical_schemes.time === 'none') state.numerical_schemes.time = 'CrankNicolson';
    uiState.activeFaceZones = {};
    Object.entries(state.faceZone_conditions || {}).forEach(([region, zones]) => {
      uiState.activeFaceZones[region] = Object.keys(zones);
    });
    uiState.visitedSteps = new Set(data.visitedSteps || [1]);
    if (data.currentStep) uiState.currentStep = data.currentStep;
    if (data.customMaterials) {
      materialLib.custom = data.customMaterials;
      rebuildMaterialLibrary();
    }
    for (const key of Object.keys(csvPanels)) delete csvPanels[key];
    return 'draft';
  } else {
    loadSimInputs(JSON.stringify(data));
    for (const key of Object.keys(csvPanels)) delete csvPanels[key];
    return 'sim_inputs';
  }
}

/** Load a full project from a FileSystemDirectoryHandle (Chrome/Edge). */
async function loadProjectFolder(dirHandle) {
  const messages = [];
  // 1. Find sim_inputs.json or draft
  let simInputsData = null;
  for (const name of ['sim_inputs.json', 'sim_inputs_draft.json']) {
    try {
      const fh = await dirHandle.getFileHandle(name);
      const text = await (await fh.getFile()).text();
      simInputsData = { data: JSON.parse(text), name };
      break;
    } catch { /* not found, try next */ }
  }
  if (!simInputsData) { showMessage('error', 'No sim_inputs.json or sim_inputs_draft.json found in the selected folder.'); return; }
  const kind = applyLoadedJsonData(simInputsData.data);
  messages.push(kind === 'draft'
    ? `Draft restored from "${simInputsData.name}"`
    : `"${simInputsData.name}" loaded`);

  // 2. Load custom_materials_library.json if present
  try {
    const fh = await dirHandle.getFileHandle('custom_materials_library.json');
    const text = await (await fh.getFile()).text();
    const matData = JSON.parse(text);
    materialLib.custom = Object.assign({}, materialLib.custom, matData);
    rebuildMaterialLibrary();
    const count = Object.keys(matData).filter(k => k !== '_info').length;
    messages.push(`${count} custom material(s) loaded`);
  } catch { /* optional */ }

  // 3. Set inputData/ as csvOutputDirHandle and auto-load CSVs
  try {
    const inputDataHandle = await dirHandle.getDirectoryHandle('inputData');
    csvOutputDirHandle = inputDataHandle;
    const csvCount = await autoLoadCsvFiles(inputDataHandle);
    messages.push(`inputData/ folder linked${csvCount > 0 ? `, ${csvCount} CSV file(s) loaded` : ''}`);
  } catch { /* optional */ }

  renderSidebar();
  renderCurrentStep();
  showMessage('success', '✓ Project loaded — ' + messages.join(' · ') + '.');
}

/** Fallback: handle multiple selected files (JSON + CSV) when directory picker unavailable. */
async function loadProjectFiles(files) {
  const messages = [];
  // Separate JSON files from CSV files
  const jsonFiles = Array.from(files).filter(f => f.name.endsWith('.json'));
  const csvFiles  = Array.from(files).filter(f => f.name.endsWith('.csv'));

  // Identify sim_inputs vs custom_materials among JSON files
  let simInputsFile = null, matFile = null;
  for (const f of jsonFiles) {
    const text = await f.text();
    let parsed;
    try { parsed = JSON.parse(text); } catch { continue; }
    if (parsed.__sim_inputs_draft || parsed.simulation || parsed.regions) {
      simInputsFile = { parsed, name: f.name };
    } else {
      matFile = { parsed, name: f.name };
    }
  }

  if (!simInputsFile) { showMessage('error', 'No sim_inputs.json or draft file found among selected files.'); return; }
  const kind = applyLoadedJsonData(simInputsFile.parsed);
  messages.push(kind === 'draft' ? `Draft restored` : `"${simInputsFile.name}" loaded`);

  if (matFile) {
    materialLib.custom = Object.assign({}, materialLib.custom, matFile.parsed);
    rebuildMaterialLibrary();
    const count = Object.keys(matFile.parsed).filter(k => k !== '_info').length;
    messages.push(`${count} custom material(s) loaded`);
  }

  if (csvFiles.length > 0) {
    const index = buildCsvFileIndex();
    let csvLoaded = 0;
    for (const f of csvFiles) {
      const entry = index.get(f.name);
      if (!entry) continue;
      const text = await f.text();
      const parsed = parseCsvText(text);
      if (!parsed.length) continue;
      const maxCols = Math.max(...parsed.map(r => r.length));
      const rows = parsed.map(r => { while (r.length < maxCols) r.push(''); return r; });
      const panel = getCsvPanel(entry.ctxKey, entry.numComponents);
      panel.rows = rows; panel.dirty = false; panel.loaded = true;
      csvLoaded++;
    }
    if (csvLoaded > 0) messages.push(`${csvLoaded} CSV file(s) loaded`);
  }

  renderSidebar();
  renderCurrentStep();
  showMessage('success', '✓ Project loaded — ' + messages.join(' · ') + '.');
}

function initDefaults() {
  rebuildMaterialLibrary();
  ensureSolverCompatibility();
  renderSidebar();
  renderCurrentStep();
}

function toggleExpandedPatch(region, patch) {
  uiState.expandedPatches[region] = uiState.expandedPatches[region] || {};
  uiState.expandedPatches[region][patch] = !uiState.expandedPatches[region][patch];
}

function handlePanelClick(event) {
  const btn = event.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;
  _handlePanelClickAsync(btn, action).catch(err => showMessage('error', err.message));
}

async function _handlePanelClickAsync(btn, action) {
  if (action === 'goto-step') {
    const step = parseIntSafe(btn.dataset.step, 1);
    if (uiState.visitedSteps.has(step)) goToStep(step);
    return;
  }
  if (action === 'select-tab') {
    uiState.tabs[btn.dataset.tabKey] = btn.dataset.tabValue;
    renderCurrentStep();
    return;
  }
  if (action === 'generate-json') {
    if (!validateMaterialAssignments()) return;
    downloadText('sim_inputs.json', buildExportJSON());
    const customEntries = Object.keys(materialLib.custom).filter(k => k !== '_info');
    if (customEntries.length > 0) {
      showMessage('success', `sim_inputs.json generated. Custom materials detected — use the button below to also download custom_materials_library.json.`);
    } else {
      showMessage('success', 'sim_inputs.json generated.');
    }
    renderCurrentStep();
    return;
  }
  if (action === 'download-allrun') {
    await downloadAllrun();
    return;
  }
  if (action === 'download-allclean') {
    await downloadAllclean();
    return;
  }
  if (action === 'delete-region') {
    const region = btn.dataset.region;
    state.regions.fluids = state.regions.fluids.filter(r => r !== region);
    state.regions.solids = state.regions.solids.filter(r => r !== region);
    cleanupRegionReferences(region);
    renderCurrentStep();
    return;
  }
  if (action === 'delete-zone-override') {
    const { region, zone } = btn.dataset;
    const cfg = state.material_properties[region];
    if (cfg?.properties) delete cfg.properties[zone];
    // Close copy panel if it was open for this zone
    if (uiState.zoneCopyPanel.sourceZone === zone && uiState.zoneCopyPanel.sourceRegion === region) {
      uiState.zoneCopyPanel = { open: false, sourceRegion: '', sourceZone: '', selected: [] };
    }
    renderCurrentStep();
    return;
  }
  if (action === 'parse-add-region') {
    const name = (uiState.meshImport.regionName || '').trim();
    if (!name) {
      showMessage('error', 'Region name is required.');
      return;
    }
    if (getAllRegions().includes(name)) {
      showMessage('error', 'Region name already exists.');
      return;
    }
    const ct = state.simulation.case_type || 'cht';
    if (ct !== 'cht' && getAllRegions().length >= 1) {
      showMessage('error', 'Single-region case — only one region is allowed. Delete the existing region first.');
      return;
    }
    if (!uiState.meshImport.text) {
      showMessage('error', 'Load a checkMesh log first.');
      return;
    }
    const parsed = parseMeshLog(uiState.meshImport.text);
    state.region_parts[name] = parsed;
    if (uiState.meshImport.regionType === 'fluid') state.regions.fluids.push(name);
    else state.regions.solids.push(name);
    ensureRegionData(name, uiState.meshImport.regionType);
    showMessage('success', `Region "${name}" added: ${parsed.boundaries.length} boundaries, ${parsed.cellZones.length} cellZones, ${parsed.faceZones.length} faceZones.`);
    uiState.meshImport = { text: '', fileName: '', regionName: '', regionType: uiState.meshImport.regionType };
    renderCurrentStep();
    return;
  }
  if (action === 'select-cht-patch') {
    const side = btn.dataset.side;
    if (side === 'A') uiState.chtSelection.patchA = btn.dataset.patch;
    else uiState.chtSelection.patchB = btn.dataset.patch;
    renderCurrentStep();
    return;
  }
  if (action === 'link-cht-interface') {
    const { regionA, patchA, regionB, patchB, conformal } = uiState.chtSelection;
    let nextIndex = 1;
    while (state.region_parts.cht_interfaces[`interface-${nextIndex}`]) nextIndex += 1;
    const name = `interface-${nextIndex}`;
    state.region_parts.cht_interfaces[name] = {
      pair: [
        { region: regionA, boundary: patchA },
        { region: regionB, boundary: patchB }
      ],
      conformal: conformal ?? true
    };
    state.boundary_conditions.cht_interfaces[name] = { thermal_layers: [], emissivity: 0.9 };
    // Clear patch selections and reset conformal; keep regions for next pairing
    uiState.chtSelection.patchA = '';
    uiState.chtSelection.patchB = '';
    uiState.chtSelection.conformal = true;
    renderCurrentStep();
    return;
  }
  if (action === 'delete-interface') {
    const name = btn.dataset.interface;
    delete state.region_parts.cht_interfaces[name];
    delete state.boundary_conditions.cht_interfaces[name];
    renderCurrentStep();
    return;
  }
  if (action === 'add-cht-layer') {
    const name = btn.dataset.interface;
    state.boundary_conditions.cht_interfaces[name] = state.boundary_conditions.cht_interfaces[name] || { thermal_layers: [] };
    state.boundary_conditions.cht_interfaces[name].thermal_layers.push({ thickness: 0.0, conductivity: 1.0 });
    renderCurrentStep();
    return;
  }
  if (action === 'delete-cht-layer') {
    const name = btn.dataset.interface;
    const idx = parseIntSafe(btn.dataset.index, 0);
    state.boundary_conditions.cht_interfaces[name]?.thermal_layers?.splice(idx, 1);
    renderCurrentStep();
    return;
  }
  if (action === 'open-zone-copy-panel') {
    uiState.zoneCopyPanel = { open: true, sourceRegion: btn.dataset.region, sourceZone: btn.dataset.zone, selected: [] };
    renderCurrentStep();
    return;
  }
  if (action === 'close-zone-copy-panel') {
    uiState.zoneCopyPanel = { open: false, sourceRegion: '', sourceZone: '', selected: [] };
    renderCurrentStep();
    return;
  }
  if (action === 'apply-zone-copy') {
    const { sourceRegion, sourceZone, selected } = uiState.zoneCopyPanel;
    const sourceEntry = state.material_properties[sourceRegion].properties[sourceZone];
    selected.forEach(zone => {
      state.material_properties[sourceRegion].properties[zone] = deepClone(sourceEntry);
    });
    uiState.zoneCopyPanel = { open: false, sourceRegion: '', sourceZone: '', selected: [] };
    renderCurrentStep();
    return;
  }
  if (action === 'toggle-material-detail') {
    const name = btn.dataset.material;
    uiState.expandedMaterial = uiState.expandedMaterial === name ? null : name;
    renderCurrentStep();
    return;
  }
  if (action === 'toggle-new-material') {
    uiState.expandedSections.newMaterial = !uiState.expandedSections.newMaterial;
    if (uiState.expandedSections.newMaterial && !uiState.newMaterialDraft) uiState.newMaterialDraft = defaultNewMaterialDraft();
    renderCurrentStep();
    return;
  }
  if (action === 'export-custom-library') {
    downloadText('custom_materials_library.json', JSON.stringify(materialLib.custom, null, 4));
    showMessage('success', 'Custom materials library exported.');
    return;
  }
  if (action === 'save-new-material') {
    const d = uiState.newMaterialDraft;
    const name = (d.name || '').trim();
    if (!name) {
      showMessage('error', 'Material name is required.');
      return;
    }
    const entry = { _description: d._description || '', _type: d._type, molecular_weight: d.molecular_weight };
    if (d._type === 'fluid') {
      entry.rho = deepClone(d.rho);
      entry.Cp = deepClone(d.Cp);
      entry.mu = deepClone(d.mu);
      entry.kappa = deepClone(d.kappa);
      if (entry.rho.model !== 'constant') delete entry.rho.value;
      if (entry.Cp.model !== 'constant') delete entry.Cp.value;
      if (entry.mu.model !== 'constant') delete entry.mu.value;
      if (entry.kappa.model !== 'constant') delete entry.kappa.value;
      if (entry.rho.model !== 'polynomial') delete entry.rho.coefficients;
      if (entry.Cp.model !== 'polynomial') delete entry.Cp.coefficients;
      if (entry.mu.model !== 'polynomial') delete entry.mu.coefficients;
      if (entry.kappa.model !== 'polynomial') delete entry.kappa.coefficients;
    } else {
      entry.rho = d.solid_rho;
      entry.Cp = d.solid_Cp;
      entry.kappa = d.solid_kappa;
    }
    materialLib.custom[name] = entry;
    rebuildMaterialLibrary();
    uiState.newMaterialDraft = defaultNewMaterialDraft();
    uiState.expandedSections.newMaterial = false;
    renderCurrentStep();
    return;
  }
  if (action === 'toggle-patch-expand') {
    toggleExpandedPatch(btn.dataset.region, btn.dataset.patch);
    renderCurrentStep();
    return;
  }
  if (action === 'open-bc-copy-panel') {
    uiState.bcCopyPanel = { open: true, sourceRegion: btn.dataset.region, sourcePatch: btn.dataset.patch, selected: [] };
    renderCurrentStep();
    return;
  }
  if (action === 'close-bc-copy-panel') {
    uiState.bcCopyPanel = { open: false, sourceRegion: '', sourcePatch: '', selected: [] };
    renderCurrentStep();
    return;
  }
  if (action === 'apply-bc-copy') {
    const { sourceRegion, sourcePatch, selected } = uiState.bcCopyPanel;
    const sourceBC = state.boundary_conditions[sourceRegion]?.[sourcePatch];
    if (sourceBC) {
      selected.forEach(patch => {
        state.boundary_conditions[sourceRegion][patch] = deepClone(sourceBC);
      });
    }
    uiState.bcCopyPanel = { open: false, sourceRegion: '', sourcePatch: '', selected: [] };
    renderCurrentStep();
    return;
  }
  if (action === 'add-active-facezone') {
    const region = btn.dataset.region;
    const selectEl = document.getElementById(`add-fz-select-${region}`);
    const zone = selectEl?.value;
    if (!zone) return;
    if (!uiState.activeFaceZones[region]) uiState.activeFaceZones[region] = [];
    if (!uiState.activeFaceZones[region].includes(zone)) uiState.activeFaceZones[region].push(zone);
    const cfg = faceZoneConfig(region, zone);
    if (!cfg.patch_name) cfg.patch_name = zone; // auto-populate patch name
    renderCurrentStep();
    return;
  }
  if (action === 'remove-active-facezone') {
    const region = btn.dataset.region;
    const zone = btn.dataset.zone;
    if (uiState.activeFaceZones[region]) {
      uiState.activeFaceZones[region] = uiState.activeFaceZones[region].filter(z => z !== zone);
    }
    delete (state.faceZone_conditions[region] || {})[zone];
    renderCurrentStep();
    return;
  }
  if (action === 'add-bc-layer') {
    const bc = getBC(btn.dataset.region, btn.dataset.patch);
    const arr = getByPath(bc, btn.dataset.path, []);
    arr.push({ thickness: 0.0, conductivity: 1.0 });
    setByPath(bc, btn.dataset.path, arr);
    renderCurrentStep();
    return;
  }
  if (action === 'delete-bc-layer') {
    const bc = getBC(btn.dataset.region, btn.dataset.patch);
    const arr = getByPath(bc, btn.dataset.path, []);
    arr.splice(parseIntSafe(btn.dataset.index, 0), 1);
    setByPath(bc, btn.dataset.path, arr);
    renderCurrentStep();
    return;
  }
  if (action === 'add-fv-option') {
    const region = btn.dataset.region;
    state.fv_options[region] = state.fv_options[region] || [];
    state.fv_options[region].push({ type: 'heat-source', mode: 'absolute', value: 0.0 });
    renderCurrentStep();
    return;
  }
  if (action === 'delete-fv-option') {
    state.fv_options[btn.dataset.region].splice(parseIntSafe(btn.dataset.index, 0), 1);
    renderCurrentStep();
    return;
  }
  if (action === 'add-monitor') {
    const region = btn.dataset.region;
    state.function_objects[region] = state.function_objects[region] || [];
    state.function_objects[region].push({ type: 'volume_average', field: 'temperature' });
    renderCurrentStep();
    return;
  }
  if (action === 'delete-monitor') {
    const region = btn.dataset.region;
    const idx = parseIntSafe(btn.dataset.index, 0);
    // Clean up expand state for this row and re-index keys above it
    delete uiState.czAvgExpanded[`${region}:${idx}`];
    const newExpanded = {};
    Object.entries(uiState.czAvgExpanded).forEach(([k, v]) => {
      const [r, i] = k.split(':');
      if (r === region && parseIntSafe(i, 0) > idx) newExpanded[`${r}:${parseIntSafe(i,0)-1}`] = v;
      else newExpanded[k] = v;
    });
    uiState.czAvgExpanded = newExpanded;
    state.function_objects[region].splice(idx, 1);
    renderCurrentStep();
    return;
  }
  if (action === 'toggle-section') {
    const section = btn.dataset.section;
    uiState.expandedSections[section] = !uiState.expandedSections[section];
    return;
  }
  if (action === 'toggle-czavg-expand') {
    const key = `${btn.dataset.region}:${btn.dataset.index}`;
    uiState.czAvgExpanded[key] = !uiState.czAvgExpanded[key];
    renderCurrentStep();
    return;
  }
  if (action === 'set-csv-dir' || btn.id === 'set-csv-dir-btn-step1') {
    try {
      const handle = await window.showDirectoryPicker({ mode: 'readwrite', startIn: 'desktop' });
      if (handle.name !== 'inputData') {
        showMessage('error', `Selected folder is "${handle.name}" — please select a folder named exactly "inputData".`);
        return;
      }
      csvOutputDirHandle = handle;
      showMessage('success', `Input data folder set to "${csvOutputDirHandle.name}/". All CSV exports will now save directly there.`);
      renderCurrentStep();
    } catch (err) {
      if (err.name !== 'AbortError') showMessage('error', 'Failed to select folder: ' + err.message);
    }
    return;
  }
  // ── CSV Panel click handlers ───────────────────────────────────────────────
  if (action === 'csv-load-file') {
    const ctxKey = btn.dataset.ctx;
    const fileInput = btn.nextElementSibling;
    if (fileInput && fileInput.dataset.action === 'csv-file-input') fileInput.click();
    return;
  }
  if (action === 'csv-add-row') {
    const ctxKey = btn.dataset.ctx;
    const panel = csvPanels[ctxKey];
    if (!panel) return;
    const numCols = parseIntSafe(btn.dataset.numcols, panel.rows[0]?.length || 2);
    panel.rows.push(Array(numCols).fill(''));
    panel.dirty = true;
    renderCurrentStep();
    return;
  }
  if (action === 'csv-del-row') {
    const ctxKey = btn.dataset.ctx;
    const panel = csvPanels[ctxKey];
    if (!panel) return;
    panel.rows.splice(parseIntSafe(btn.dataset.row, 0), 1);
    panel.dirty = true;
    renderCurrentStep();
    return;
  }
  if (action === 'csv-add-col') {
    const ctxKey = btn.dataset.ctx;
    const panel = csvPanels[ctxKey];
    if (!panel) return;
    panel.rows.forEach(row => row.push(''));
    panel.dirty = true;
    renderCurrentStep();
    return;
  }
  if (action === 'csv-del-col') {
    const ctxKey = btn.dataset.ctx;
    const panel = csvPanels[ctxKey];
    if (!panel || panel.rows[0]?.length <= 2) return;
    panel.rows.forEach(row => row.pop());
    panel.dirty = true;
    renderCurrentStep();
    return;
  }
  if (action === 'csv-export') {
    const ctxKey = btn.dataset.ctx;
    const panel = csvPanels[ctxKey];
    if (!panel) return;
    // Get current filename from state
    const [type, ...rest] = ctxKey.split('|');
    let filename = 'data.csv';
    if (type === 'bc') {
      const [region, patch, basePath] = rest;
      filename = getByPath(getBC(region, patch), basePath + '.csv_file', '') || 'data.csv';
    } else if (type === 'fz') {
      const [region, zone] = rest;
      filename = faceZoneConfig(region, zone).fan_curve?.csv_file || 'fan_curve.csv';
    }
    const csvText = serializeCsvRows(panel.rows);
    if (csvOutputDirHandle) {
      // Write directly into the user-selected inputData/ directory
      try {
        const fileHandle = await csvOutputDirHandle.getFileHandle(filename, { create: true });
        const writable = await fileHandle.createWritable();
        await writable.write(csvText);
        await writable.close();
        panel.dirty = false;
        updateCsvStatusBadge(ctxKey);
        showMessage('success', `✓ Saved "${filename}" directly to "${csvOutputDirHandle.name}/" (${panel.rows.length} rows).`);
      } catch (err) {
        showMessage('error', `Failed to write "${filename}": ${err.message}`);
      }
    } else {
      // Fallback: browser download — user must manually place file
      const blob = new Blob([csvText], { type: 'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);
      panel.dirty = false;
      updateCsvStatusBadge(ctxKey);
      showMessage('success', `Downloaded "${filename}" — manually move it to the inputData/ directory. Tip: click "📁 Set inputData/ folder" in the toolbar to auto-save there next time.`);
    }
    return;
  }
}

function ensureBCShape(region, patch, type) {
  const bc = deepClone(BC_DEFAULTS[type]);
  // For incompressible solvers (simpleFoam/pimpleFoam): remove thermal from fluid BCs
  if (isIncompressibleSolver()) {
    if (type === 'velocity-inlet' || type === 'total-pressure-inlet' || type === 'no-slip-wall') {
      delete bc.thermal;
    }
  }
  if (type === 'pressure-outlet' && !bc.backflow_conditions) bc.backflow_conditions = defaultBackflow();
  setBC(region, patch, bc);
}

function handlePanelChange(event) {
  const target = event.target;
  const action = target.dataset.action;
  if (!action) return;

  if (action === 'set-sim-type') {
    const nextType = target.value;
    const prevType = state.simulation.type;
    const prevSolver = state.simulation.solver_name;
    state.simulation.type = nextType;
    state.simulation.solver_name = getAvailableSolvers().includes(prevSolver) ? prevSolver : getAvailableSolvers()[0];
    // Reset time scheme based on sim type
    if (nextType === 'steady-state') {
      state.numerical_schemes.time = 'none';
    } else if (prevType === 'steady-state') {
      state.numerical_schemes.time = 'CrankNicolson';
    }
    // Relative tolerance: 0.1 for steady-state, 0.01 for transient
    const relTol = nextType === 'steady-state' ? 0.1 : 0.01;
    state.matrix_solvers.fluid.pressure.relative_tolerance = relTol;
    state.matrix_solvers.fluid.others.relative_tolerance   = relTol;
    state.matrix_solvers.solid.energy.relative_tolerance   = relTol;
    // Enforce fixed values for steady-state iterative settings
    if (nextType === 'steady-state') {
      state.iterative_solver.fluid.momentum_predictor          = true;
      state.iterative_solver.fluid.solve_turb_once_per_timestep = false;
    }
    renderCurrentStep();
    return;
  }
  if (action === 'set-case-type') {
    const prevSolver = state.simulation.solver_name;
    state.simulation.case_type = target.value;
    const options = getAvailableSolvers();
    state.simulation.solver_name = options.includes(prevSolver) ? prevSolver : options[0];
    renderCurrentStep();
    return;
  }
  if (action === 'set-state') {
    setByPath(state, target.dataset.path, coerceValue(target));
    if (target.dataset.rerender === '1') renderCurrentStep();
    return;
  }
  if (action === 'set-sci') {
    const raw = target.value.trim();
    if (!isValidSciNum(raw)) {
      target.classList.add('invalid');
      return;
    }
    target.classList.remove('invalid');
    setByPath(state, target.dataset.path, parseFloat(raw));
    return;
  }
  if (action === 'set-ui-mesh') {
    uiState.meshImport[target.dataset.field] = target.value;
    return;
  }
  if (action === 'set-ui-mesh-type') {
    uiState.meshImport.regionType = target.value;
    return;
  }
  if (action === 'set-cht-region') {
    const side = target.dataset.side;
    if (side === 'A') {
      uiState.chtSelection.regionA = target.value;
      uiState.chtSelection.patchA = '';
    } else {
      uiState.chtSelection.regionB = target.value;
      uiState.chtSelection.patchB = '';
    }
    renderCurrentStep();
    return;
  }
  if (action === 'set-cht-conformal') {
    const ifaceName = target.dataset.interface;
    if (ifaceName) {
      // Editing an already-defined interface
      state.region_parts.cht_interfaces[ifaceName].conformal = target.checked;
    } else {
      // Editing the pending selection
      uiState.chtSelection.conformal = target.checked;
    }
    return;
  }
  if (action === 'set-cht-layer') {
    const entry = state.boundary_conditions.cht_interfaces[target.dataset.interface].thermal_layers[parseIntSafe(target.dataset.index, 0)];
    entry[target.dataset.field] = coerceValue(target);
    return;
  }
  if (action === 'set-cht-emissivity') {
    const name = target.dataset.interface;
    state.boundary_conditions.cht_interfaces[name] = state.boundary_conditions.cht_interfaces[name] || { thermal_layers: [] };
    state.boundary_conditions.cht_interfaces[name].emissivity = coerceValue(target);
    return;
  }
  if (action === 'set-fluid-material') {
    state.material_properties[target.dataset.region] = target.value;
    return;
  }
  if (action === 'set-solid-mode') {
    const region = target.dataset.region;
    if (target.value === 'uniform') {
      const firstSolid = getMaterialEntries('solid')[0]?.[0] || 'copper';
      state.material_properties[region] = { type: 'uniform', material: firstSolid, kappa_type: 'isotropic' };
    } else {
      state.material_properties[region] = { type: 'cell_zone_specific', kappa_type: 'isotropic', properties: { default: { material: '' } } };
    }
    uiState.zoneCopyPanel = { open: false, sourceRegion: '', sourceZone: '', selected: [] };
    renderCurrentStep();
    return;
  }
  if (action === 'set-solid-path') {
    const region = target.dataset.region;
    if (target.dataset.path === 'kappa_type') {
      setByPath(state.material_properties[region], target.dataset.path, target.value);
      if (target.value === 'anisotropic') {
        state.material_properties[region].coordinate_system = state.material_properties[region].coordinate_system || { origin: [0, 0, 0], e1: [1, 0, 0], e2: [0, 1, 0] };
        if (state.material_properties[region].type === 'uniform') state.material_properties[region].kappa = [1, 1, 1];
        if (state.material_properties[region].type === 'cell_zone_specific') {
          Object.values(state.material_properties[region].properties).forEach(item => { item.kappa = Array.isArray(item.kappa) ? item.kappa : [1, 1, 1]; });
        }
      } else {
        // Switching back to isotropic: remove kappa from all entries (library provides it)
        if (state.material_properties[region].type === 'uniform') delete state.material_properties[region].kappa;
        if (state.material_properties[region].type === 'cell_zone_specific') {
          Object.values(state.material_properties[region].properties).forEach(item => { delete item.kappa; });
        }
      }
      renderCurrentStep();
    } else {
      setByPath(state.material_properties[region], target.dataset.path, coerceValue(target));
      if (target.dataset.rerender === '1') renderCurrentStep();
    }
    return;
  }
  if (action === 'toggle-zone-copy-select') {
    const zone = target.dataset.zone;
    const sel = uiState.zoneCopyPanel.selected;
    if (target.checked) { if (!sel.includes(zone)) sel.push(zone); }
    else { uiState.zoneCopyPanel.selected = sel.filter(z => z !== zone); }
    renderCurrentStep();
    return;
  }
  if (action === 'set-zone-kappa-index') {
    const obj = state.material_properties[target.dataset.region].properties[target.dataset.zone];
    obj.kappa = Array.isArray(obj.kappa) ? obj.kappa : [1, 1, 1];
    obj.kappa[parseIntSafe(target.dataset.index, 0)] = parseNum(target.value, 0);
    return;
  }
  if (action === 'set-zone-material') {
    const { region, zone } = target.dataset;
    const entry = state.material_properties[region].properties[zone];
    entry.material = target.value;
    renderCurrentStep();
    return;
  }
  if (action === 'add-zone-override') {
    const zone = target.value;
    if (!zone) return;
    const cfg = state.material_properties[target.dataset.region];
    if (cfg?.properties) {
      const extra = cfg.kappa_type === 'anisotropic' ? { kappa: [1, 1, 1] } : {};
      cfg.properties[zone] = { material: '', ...extra };
    }
    target.value = ''; // reset select to placeholder
    renderCurrentStep();
    return;
  }
  if (action === 'set-new-material-field') {
    uiState.newMaterialDraft[target.dataset.field] = target.dataset.kind === 'number' ? parseNum(target.value, 0) : target.value;
    return;
  }
  if (action === 'set-new-material-type') {
    uiState.newMaterialDraft._type = target.value;
    renderCurrentStep();
    return;
  }
  if (action === 'set-new-material-prop') {
    const prop = uiState.newMaterialDraft[target.dataset.prop];
    if (target.dataset.path === 'model') prop.model = target.value;
    else prop[target.dataset.path] = target.dataset.kind === 'number' ? parseNum(target.value, 0) : target.value;
    if (target.dataset.rerender === '1') renderCurrentStep();
    return;
  }
  if (action === 'set-new-material-coeff') {
    uiState.newMaterialDraft[target.dataset.prop].coefficients[parseIntSafe(target.dataset.index, 0)] = parseNum(target.value, 0);
    return;
  }
  if (action === 'copy-material-template') {
    const name = target.value;
    const draft = defaultNewMaterialDraft();
    draft.copyFrom = name;
    if (name && materialLib.merged[name]) {
      const src = deepClone(materialLib.merged[name]);
      draft.name = '';
      draft._description = src._description || '';
      draft._type = src._type || 'fluid';
      draft.molecular_weight = src.molecular_weight || draft.molecular_weight;
      if (draft._type === 'fluid') {
        draft.rho = src.rho || draft.rho;
        draft.Cp = src.Cp || draft.Cp;
        draft.mu = src.mu || draft.mu;
        draft.kappa = src.kappa || draft.kappa;
      } else {
        draft.solid_rho = src.rho || draft.solid_rho;
        draft.solid_Cp = src.Cp || draft.solid_Cp;
        draft.solid_kappa = src.kappa || draft.solid_kappa;
      }
    }
    uiState.newMaterialDraft = draft;
    renderCurrentStep();
    return;
  }
  if (action === 'toggle-bc-copy-select') {
    const patch = target.dataset.patch;
    const sel = uiState.bcCopyPanel.selected;
    if (target.checked) { if (!sel.includes(patch)) sel.push(patch); }
    else { uiState.bcCopyPanel.selected = sel.filter(p => p !== patch); }
    renderCurrentStep();
    return;
  }
  if (action === 'select-tab') {
    uiState.tabs[target.dataset.tabKey] = target.dataset.tabValue;
    renderCurrentStep();
    return;
  }
  if (action === 'set-bc-type') {
    const region = target.dataset.region;
    const patch = target.dataset.patch;
    if (!target.value) {
      delete state.boundary_conditions[region][patch];
    } else {
      ensureBCShape(region, patch, target.value);
    }
    renderCurrentStep();
    return;
  }
  if (action === 'set-bc') {
    const bc = getBC(target.dataset.region, target.dataset.patch);
    setByPath(bc, target.dataset.path, coerceValue(target));
    if (target.dataset.path === 'prevent_backflow') {
      if (bc.prevent_backflow && !bc.backflow_conditions) bc.backflow_conditions = defaultBackflow();
      if (!bc.prevent_backflow) delete bc.backflow_conditions;
    }
    // When velocity mode changes, ensure value type matches the new mode and clear stale time_varying
    if (target.dataset.path === 'velocity.mode') {
      const newMode = target.value;
      const vel = bc.velocity;
      if (newMode === 'components' && !Array.isArray(vel.value)) {
        vel.value = [0, 0, 0];
      } else if (newMode === 'normal-magnitude' && Array.isArray(vel.value)) {
        vel.value = 0;
      }
      // time_varying CSV is mode-specific (component count differs); discard on mode switch
      delete vel.time_varying;
    }
    // When thermal mode switches to heat-transfer-coefficient, initialize required fields so
    // they are not silently dropped as undefined by JSON.stringify
    if (target.dataset.path.endsWith('thermal.mode') && target.value === 'heat-transfer-coefficient') {
      const thermalPath = target.dataset.path.slice(0, -5); // strip '.mode'
      const thermal = getByPath(bc, thermalPath);
      if (thermal) {
        if (thermal.htc == null) thermal.htc = 0;
        if (thermal.ambient_temperature == null) thermal.ambient_temperature = state.reference_conditions.temperature;
        if (thermal.outer_emissivity == null) thermal.outer_emissivity = 0;
      }
    }
    // When turbulence mode switches to dirichlet, initialize k and active secondary field
    if (target.dataset.path.endsWith('turbulence.mode') && target.value === 'dirichlet') {
      const turbPath = target.dataset.path.slice(0, -5); // strip '.mode'
      const turb = getByPath(bc, turbPath);
      if (turb) {
        if (turb.k == null) turb.k = 1.0;
        const field2 = currentThermalSecondaryLabel();
        if (turb[field2] == null) turb[field2] = 1000;
      }
    }
    if (target.dataset.rerender === '1') renderCurrentStep();
    return;
  }
  if (action === 'toggle-bc-timevarying') {
    const bc = getBC(target.dataset.region, target.dataset.patch);
    const section = getByPath(bc, target.dataset.path, {});
    if (target.checked) {
      section.time_varying = section.time_varying || { csv_file: '', ref_column: 0, component_columns: [1], skip_rows: 1 };
    } else {
      delete section.time_varying;
      // Clean up any csv panel state for this context
      const ctxPrefix = `bc|${target.dataset.region}|${target.dataset.patch}|${target.dataset.path}`;
      for (const key of Object.keys(csvPanels)) {
        if (key.startsWith(ctxPrefix)) delete csvPanels[key];
      }
    }
    setByPath(bc, target.dataset.path, section);
    renderCurrentStep();
    return;
  }
  if (action === 'set-facezone') {
    const cfg = faceZoneConfig(target.dataset.region, target.dataset.zone);
    setByPath(cfg, target.dataset.path, coerceValue(target));
    if (target.dataset.rerender === '1') renderCurrentStep();
    return;
  }
  if (action === 'set-fv-option') {
    const item = state.fv_options[target.dataset.region][parseIntSafe(target.dataset.index, 0)];
    const value = target.dataset.kind === 'number' ? parseNum(target.value, 0) : target.value;
    if (target.dataset.field === 'cellZone' && !value) delete item.cellZone;
    else item[target.dataset.field] = value;
    return;
  }
  if (action === 'set-ic') {
    const region = target.dataset.region;
    setByPath(state.initial_conditions[region], target.dataset.path, coerceValue(target));
    return;
  }
  if (action === 'toggle-ic-ref-temp') {
    const region = target.dataset.region;
    state.initial_conditions[region].T = target.checked ? 'REF-TEMP' : state.reference_conditions.temperature;
    renderCurrentStep();
    return;
  }
  if (action === 'set-monitor-type') {
    const region = target.dataset.region;
    const idx = parseIntSafe(target.dataset.index, 0);
    const item = state.function_objects[region][idx];
    const newType = target.value;

    // Guard: disallow forbidden types for solid regions
    if (regionType(region) === 'solid' && ['mass_average','mass_integral','mass_flow_rate','volume_flow_rate'].includes(newType)) {
      showMessage('error', `Type "${newType}" is not allowed for solid region "${region}" (no density/flux/velocity fields).`);
      target.value = item.type; // revert dropdown
      return;
    }

    const wasCzAvg = item.type === 'cellZone_average';
    const nowCzAvg = newType === 'cellZone_average';
    const nowMassFlowRate = newType === 'mass_flow_rate';
    const nowVolFlowRate  = newType === 'volume_flow_rate';
    const nowImplicitField = nowMassFlowRate || nowVolFlowRate;
    const nowSurface = newType.startsWith('area_') || newType.startsWith('surface_') || nowMassFlowRate || nowVolFlowRate;
    const wasVolume = !item.type.startsWith('area_') && !item.type.startsWith('surface_') && !wasCzAvg && item.type !== 'mass_flow_rate' && item.type !== 'volume_flow_rate';
    // Guard: disallow duplicate cellZone_average for the same field
    if (nowCzAvg && !wasCzAvg) {
      const conflict = state.function_objects[region].some((it, i) => i !== idx && it.type === 'cellZone_average' && it.field === item.field);
      if (conflict) {
        showMessage('error', `A cellZone_average for field "${item.field}" already exists in region "${region}". Remove it first.`);
        target.value = item.type; // revert dropdown
        return;
      }
    }

    item.type = newType;

    if (nowImplicitField) {
      // mass_flow_rate → phi; volume_flow_rate → U; scope stays on surface (patch/faceZone/cuttingPlane)
      item.field = nowMassFlowRate ? 'phi' : 'U';
      delete item.cellZone; delete item.cellZones;
      delete uiState.czAvgExpanded[`${region}:${idx}`];
      if (!item.patch && !item.faceZone && !item.cuttingPlane)
        item.patch = state.region_parts[region]?.boundaries?.[0] || '';
    } else if (nowCzAvg) {
      // Initialize cellZones array, clear all surface scope keys
      delete item.cellZone; delete item.patch; delete item.faceZone; delete item.cuttingPlane;
      if (!Array.isArray(item.cellZones)) item.cellZones = [];
    } else if (wasCzAvg) {
      // Leaving cellZone_average — clear cellZones array
      delete item.cellZones;
      delete uiState.czAvgExpanded[`${region}:${idx}`];
    } else if (wasVolume && nowSurface) {
      // Switching from volume to surface — default to patch scope
      delete item.cellZone;
      item.patch = state.region_parts[region]?.boundaries?.[0] || '';
    } else if (!wasVolume && !nowSurface) {
      // Switching from surface to volume — clear all surface scope keys
      delete item.patch; delete item.faceZone; delete item.cuttingPlane;
    }

    renderCurrentStep();
    return;
  }
  if (action === 'set-monitor-field') {
    const region = target.dataset.region;
    const idx = parseIntSafe(target.dataset.index, 0);
    const item = state.function_objects[region][idx];
    const newField = target.value;

    // Solid regions only carry temperature and wallHeatFlux — revert any other field
    if (regionType(region) === 'solid' && !['temperature','wallHeatFlux'].includes(newField)) {
      target.value = item.field;
      return;
    }

    // Guard: disallow changing to a field that already has a cellZone_average in this region
    if (item.type === 'cellZone_average') {
      const conflict = state.function_objects[region].some((it, i) => i !== idx && it.type === 'cellZone_average' && it.field === newField);
      if (conflict) {
        showMessage('error', `A cellZone_average for field "${newField}" already exists in region "${region}".`);
        target.value = item.field; // revert dropdown
        return;
      }
    }

    item.field = newField;
    return;
  }
  if (action === 'toggle-czavg-zone') {
    const region = target.dataset.region;
    const idx = parseIntSafe(target.dataset.index, 0);
    const zone = target.dataset.zone;
    const item = state.function_objects[region][idx];
    if (!Array.isArray(item.cellZones)) item.cellZones = [];
    if (target.checked) {
      if (!item.cellZones.includes(zone)) item.cellZones.push(zone);
    } else {
      item.cellZones = item.cellZones.filter(z => z !== zone);
    }
    // Re-render only the scope-name cell count text without collapsing the expand
    renderCurrentStep();
    return;
  }
  if (action === 'set-monitor-scope') {
    const item = state.function_objects[target.dataset.region][parseIntSafe(target.dataset.index, 0)];
    const prevCp = item.cuttingPlane; // preserve if user switches back
    delete item.cellZone;
    delete item.patch;
    delete item.faceZone;
    delete item.cuttingPlane;
    if (target.value === 'cellZone')      item.cellZone      = state.region_parts[target.dataset.region]?.cellZones?.[0] || '';
    if (target.value === 'patch')         item.patch         = state.region_parts[target.dataset.region]?.boundaries?.[0] || '';
    if (target.value === 'faceZone')      item.faceZone      = state.region_parts[target.dataset.region]?.faceZones?.[0] || '';
    if (target.value === 'cuttingPlane')  item.cuttingPlane  = prevCp || { name: '', point: [0, 0, 0], normal: [1, 0, 0] };
    renderCurrentStep();
    return;
  }
  if (action === 'set-monitor-scope-name') {
    const item = state.function_objects[target.dataset.region][parseIntSafe(target.dataset.index, 0)];
    delete item.cellZone;
    delete item.patch;
    delete item.faceZone;
    if (target.dataset.scope === 'cellZone') item.cellZone = target.value;
    if (target.dataset.scope === 'patch') item.patch = target.value;
    if (target.dataset.scope === 'faceZone') item.faceZone = target.value;
    return;
  }
  if (action === 'set-cutting-plane-name') {
    const item = state.function_objects[target.dataset.region][parseIntSafe(target.dataset.index, 0)];
    if (!item.cuttingPlane) item.cuttingPlane = { name: '', point: [0, 0, 0], normal: [1, 0, 0] };
    item.cuttingPlane.name = target.value;
    return;
  }
  if (action === 'set-cutting-plane-coord') {
    const item = state.function_objects[target.dataset.region][parseIntSafe(target.dataset.index, 0)];
    if (!item.cuttingPlane) item.cuttingPlane = { name: '', point: [0, 0, 0], normal: [1, 0, 0] };
    const which = target.dataset.which; // 'point' or 'normal'
    const axis  = parseIntSafe(target.dataset.axis, 0);
    if (!Array.isArray(item.cuttingPlane[which])) item.cuttingPlane[which] = [0, 0, 0];
    item.cuttingPlane[which][axis] = parseNum(target.value, 0);
    return;
  }
}

function handlePanelInput(event) {
  const target = event.target;
  const action = target.dataset.action;
  if (!action) return;
  if (action === 'csv-cell-edit') {
    const ctxKey = target.dataset.ctx;
    const panel = csvPanels[ctxKey];
    if (!panel) return;
    const row = parseIntSafe(target.dataset.row, 0);
    const col = parseIntSafe(target.dataset.col, 0);
    if (panel.rows[row]) panel.rows[row][col] = target.value;
    panel.dirty = true;
    updateCsvStatusBadge(ctxKey);
    return;
  }
  const inputActions = new Set(['set-state', 'set-ui-mesh', 'set-solid-path', 'set-zone-material', 'set-zone-kappa-index', 'add-zone-override', 'toggle-zone-copy-select', 'toggle-bc-copy-select', 'set-new-material-field', 'set-new-material-prop', 'set-new-material-coeff', 'set-bc', 'set-facezone', 'set-fv-option', 'set-ic', 'set-cutting-plane-name', 'set-cutting-plane-coord']);
  if (action === 'set-sci') { target.classList.remove('invalid'); return; }
  if (!inputActions.has(action)) return;
  handlePanelChange(event);
}

function bindGlobalEvents() {
  document.getElementById('save-draft-btn').addEventListener('click', () => {
    const draft = {
      __sim_inputs_draft: true,
      __version: 1,
      savedAt: new Date().toISOString(),
      state: deepClone(state),
      visitedSteps: Array.from(uiState.visitedSteps),
      currentStep: uiState.currentStep,
      customMaterials: deepClone(materialLib.custom)
    };
    downloadText('sim_inputs_draft.json', JSON.stringify(draft, null, 4));
    showMessage('success', 'Draft saved as sim_inputs_draft.json.');
  });

  document.getElementById('load-json-btn').addEventListener('click', async () => {
    if (window.showDirectoryPicker) {
      // Chrome/Edge: pick the entire project folder
      try {
        const handle = await window.showDirectoryPicker({ mode: 'readwrite', startIn: 'documents' });
        await loadProjectFolder(handle);
      } catch (err) {
        if (err.name !== 'AbortError') showMessage('error', 'Failed to open folder: ' + err.message);
      }
    } else {
      // Fallback: multi-file picker (select sim_inputs.json + optionally custom_materials_library.json + CSV files)
      document.getElementById('load-json-input').click();
    }
  });
  document.getElementById('load-json-input').addEventListener('change', async (e) => {
    const files = e.target.files;
    if (!files || files.length === 0) return;
    try {
      await loadProjectFiles(files);
    } catch (err) {
      showMessage('error', 'Failed to load files: ' + err.message);
    }
    e.target.value = '';
  });

  document.getElementById('prev-step-btn').addEventListener('click', goPrev);
  document.getElementById('next-step-btn').addEventListener('click', goNext);

  // Sidebar step navigation — the sidebar is outside #main-panel so needs its own listener
  document.getElementById('sidebar-steps').addEventListener('click', handlePanelClick);

  const panel = document.getElementById('main-panel');
  panel.addEventListener('click', handlePanelClick);
  panel.addEventListener('change', handlePanelChange);
  panel.addEventListener('input', handlePanelInput);
  panel.addEventListener('change', async (e) => {
    // CSV file load handler
    if (e.target.dataset.action === 'csv-file-input') {
      const file = e.target.files?.[0];
      if (!file) return;
      const ctxKey = e.target.dataset.ctx;
      const numComponents = parseIntSafe(e.target.dataset.numComponents, 1);
      const text = await file.text();
      const parsed = parseCsvText(text);
      if (!parsed.length) { showMessage('error', 'CSV appears empty.'); return; }
      // Ensure all rows have the same column count
      const maxCols = Math.max(...parsed.map(r => r.length));
      const rows = parsed.map(r => { while (r.length < maxCols) r.push(''); return r; });
      const panel = getCsvPanel(ctxKey, numComponents);
      panel.rows = rows;
      panel.dirty = false;
      panel.loaded = true;
      // Auto-detect skip_rows: 1 if first row has any non-numeric value
      const firstRow = rows[0] || [];
      const autoSkip = firstRow.some(c => c !== '' && isNaN(Number(c))) ? 1 : 0;
      // Update state: csv_file → filename, skip_rows → autoSkip
      setCsvConfigField(ctxKey, 'csv_file', file.name);
      setCsvConfigField(ctxKey, 'skip_rows', autoSkip);
      showMessage('success', `"${file.name}" loaded — ${rows.length} rows, ${maxCols} columns. Header rows auto-detected: ${autoSkip}. Verify column assignments below.`);
      e.target.value = '';
      renderCurrentStep();
      return;
    }
    if (e.target.id === 'mesh-log-input') {
      const file = e.target.files?.[0];
      if (!file) return;
      uiState.meshImport.fileName = file.name;
      uiState.meshImport.text = await file.text();
      showMessage('info', `File "${file.name}" loaded (${(file.size / 1024).toFixed(1)} KB). Enter region name and type, then click Parse & Add Region.`);
      renderCurrentStep();
    }
    if (e.target.id === 'custom-material-input') {
      const file = e.target.files?.[0];
      if (!file) return;
      try {
        const text = await file.text();
        const data = JSON.parse(text);
        materialLib.custom = Object.assign({}, materialLib.custom, data);
        rebuildMaterialLibrary();
        showMessage('success', 'Custom materials library loaded.');
      } catch (err) {
        showMessage('error', 'Failed to load materials library: ' + err.message);
      }
    }
  });
}

document.addEventListener('DOMContentLoaded', () => {
  bindGlobalEvents();
  initDefaults();
});
</script>
</body>
</html>
